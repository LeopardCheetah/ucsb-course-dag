<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Graph</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#07090f;--sf:#0c0f18;--s2:#10141f;--bd:#1a2035;--ac:#38bdf8;--a2:#fb923c;--tx:#cdd5e0;--mu:#3d4a60;--glow:0 0 16px rgba(56,189,248,.15)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:linear-gradient(rgba(56,189,248,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.018) 1px,transparent 1px);background-size:50px 50px}

  header{position:relative;z-index:10;padding:7px 14px;border-bottom:1px solid var(--bd);
    background:rgba(7,9,15,.97);backdrop-filter:blur(16px);display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:46px}
  .logo{font-size:.88rem;font-weight:800;letter-spacing:-.02em;color:var(--ac);text-shadow:var(--glow);white-space:nowrap}
  .logo span{color:var(--mu);font-weight:400}
  .sep{width:1px;height:20px;background:var(--bd);flex-shrink:0}
  .ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex:1}

  .btn{font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;padding:4px 9px;
    border:1px solid var(--bd);background:var(--sf);color:var(--tx);cursor:pointer;
    transition:all .15s;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
  .btn:hover{border-color:var(--ac);color:var(--ac);box-shadow:var(--glow)}
  .btn.on{border-color:var(--ac);color:var(--ac);background:rgba(56,189,248,.07)}
  .btn.w{border-color:var(--a2);color:var(--a2)}.btn.w.on{background:rgba(251,146,60,.07)}

  select,.srch{font-family:'JetBrains Mono',monospace;font-size:.6rem;padding:4px 7px;
    background:var(--sf);border:1px solid var(--bd);color:var(--tx);outline:none;transition:border-color .15s}
  select:focus,.srch:focus{border-color:var(--ac)}
  .srch{width:130px}.srch::placeholder{color:var(--mu)}

  .chips{display:flex;gap:4px;margin-left:auto}
  .chip{font-family:'JetBrains Mono',monospace;font-size:.56rem;padding:2px 6px;border:1px solid var(--bd);color:var(--mu);background:var(--sf)}
  .chip strong{color:var(--ac)}

  #wrap{flex:1;position:relative;z-index:1;display:flex;flex-direction:column;min-height:0}
  #main-cy{width:100%;flex:1;min-height:0}

  /* parking lot */
  #pk-wrap{border-top:1px solid var(--bd);background:rgba(10,13,20,.95);transition:height .25s ease;overflow:hidden;flex-shrink:0}
  #pk-hdr{height:28px;display:flex;align-items:center;gap:8px;padding:0 12px;cursor:pointer;user-select:none;flex-shrink:0}
  .ph-label{font-family:'JetBrains Mono',monospace;font-size:.57rem;color:var(--mu);letter-spacing:.08em;text-transform:uppercase}
  .ph-n{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--ac)}
  .ph-tog{margin-left:auto;font-size:.62rem;color:var(--mu);transition:transform .2s}
  #pk-cy{width:100%;height:calc(100% - 28px)}

  /* drop */
  #drop{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:14px;background:var(--bg)}
  .dbox{border:2px dashed var(--bd);padding:44px 64px;text-align:center;transition:all .3s;cursor:pointer}
  .dbox:hover,.dbox.over{border-color:var(--ac);box-shadow:var(--glow),inset 0 0 28px rgba(56,189,248,.04)}
  .dico{font-size:1.8rem;margin-bottom:10px;opacity:.28}.dtitle{font-size:1.1rem;font-weight:700;margin-bottom:4px}
  .dsub{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--mu);margin-bottom:14px}
  #finput{display:none}.ordiv{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--mu);letter-spacing:.1em}

  /* loading */
  #loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(7,9,15,.92);z-index:50;flex-direction:column;gap:9px}
  .lrow{font-family:'JetBrains Mono',monospace;font-size:.66rem;color:var(--ac);letter-spacing:.08em;display:flex;align-items:center;gap:7px}
  .spin{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  #lsub{font-family:'JetBrains Mono',monospace;font-size:.53rem;color:var(--mu)}

  #err{display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:100;
    background:#2a0808;border:1px solid #ef4444;color:#fca5a5;
    font-family:'JetBrains Mono',monospace;font-size:.64rem;padding:7px 14px;max-width:400px;text-align:center}

  /* tooltip */
  #tip{position:fixed;display:none;z-index:200;background:var(--s2);border:1px solid var(--ac);
    padding:11px 13px;max-width:278px;box-shadow:var(--glow);pointer-events:none}
  .tc{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--ac);margin-bottom:2px}
  .tt{font-size:.8rem;font-weight:700;margin-bottom:5px;line-height:1.25}
  .tdesc{font-size:.64rem;color:var(--mu);line-height:1.4;margin-bottom:6px}
  .tm{display:flex;gap:4px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:.57rem}
  .tg{padding:2px 5px;border:1px solid var(--bd);color:var(--mu)}
  .tg.u{border-color:rgba(167,139,250,.4);color:#c4b5fd}.tg.d{border-color:rgba(56,189,248,.28);color:var(--ac)}
  .tpreq{margin-top:5px;font-size:.59rem;color:var(--mu);font-family:'JetBrains Mono',monospace;border-top:1px solid var(--bd);padding-top:5px;line-height:1.6}
  .tpreq strong{color:var(--tx)}

  /* legend */
  #legend{position:fixed;bottom:40px;left:12px;z-index:50;background:rgba(12,15,24,.97);
    border:1px solid var(--bd);padding:10px 12px;display:none;max-height:50vh;overflow-y:auto;min-width:138px}
  .ltitle{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
  .li{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.65rem;color:var(--mu)}
  .ld{width:9px;height:9px;flex-shrink:0}
</style>
</head>
<body>
<header>
  <div class="logo">COURSE<span>GRAPH</span></div>
  <div class="sep"></div>
  <div class="ctrl" id="ctrl" style="display:none">
    <input class="srch" id="search" placeholder="Search…" oninput="doSearch()">
    <select id="dsel" onchange="doFilter()"><option value="">All Depts</option></select>
    <div class="sep"></div>
    <button class="btn w on" id="bspec" onclick="toggleFlag('spec')">Hide Special</button>
    <button class="btn"      id="bext"  onclick="toggleFlag('ext')">Hide External</button>
    <div class="sep"></div>
    <button class="btn on" onclick="cy&&cy.animate({fit:{padding:50},duration:300})">Fit</button>
    <button class="btn" onclick="resetAll()">Reset</button>
    <button class="btn" onclick="reloadUI()">Load New</button>
  </div>
  <div class="chips" id="chips" style="display:none">
    <div class="chip"><strong id="sn">0</strong> courses</div>
    <div class="chip"><strong id="se">0</strong> edges</div>
    <div class="chip"><strong id="sl">0</strong> layers</div>
    <div class="chip"><strong id="sp">0</strong> isolated</div>
  </div>
</header>

<div id="wrap">
  <div id="drop">
    <!--
    <div class="dbox" id="dbox" onclick="document.getElementById('finput').click()"
         ondragover="event.preventDefault();this.classList.add('over')"
         ondragleave="this.classList.remove('over')"
         ondrop="onDrop(event)">
      <div class="dico">⬡</div>
      <div class="dtitle">Drop course JSON here</div>
      <div class="dsub">prereqs.required = AND-of-OR groups</div>
      <button class="btn on" onclick="event.stopPropagation();document.getElementById('finput').click()">Browse File</button>
    </div>
    <div class="ordiv">— OR —</div> 
-->
    <button class="btn" onclick="loadClasses()">Load Course Visualization!</button>
    <input type="file" id="finput" accept=".json" onchange="onFile(this)">
  </div>
  <div id="loading">
    <div class="lrow"><div class="spin"></div><span id="lmsg">BUILDING…</span></div>
    <div id="lsub"></div>
  </div>
  <div id="err"></div>
  <div id="main-cy"></div>
  <div id="pk-wrap" style="height:0px">
    <div id="pk-hdr" onclick="togglePK()">
      <span class="ph-label">Isolated Chains &amp; Standalone Courses</span>
      <span class="ph-n" id="pk-n"></span>
      <span class="ph-tog" id="pk-tog">▲</span>
    </div>
    <div id="pk-cy"></div>
  </div>
</div>

<div id="tip">
  <div class="tc" id="tc"></div><div class="tt" id="tt"></div>
  <div class="tdesc" id="tdesc"></div>
  <div class="tm">
    <span class="tg u" id="tu"></span>
    <span class="tg d" id="td"></span>
    <span class="tg"   id="tdt"></span>
  </div>
  <div class="tpreq" id="tpreq"></div>
</div>

<div id="legend">
  <div class="ltitle">Departments</div>
  <div id="ldepts"></div>
  <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)">
    <div class="li"><div style="width:20px;height:2px;background:rgba(56,189,248,.7)"></div><span>Required (primary)</span></div>
    <div class="li"><div style="width:20px;height:1px;border-top:1px dotted rgba(148,163,184,.26)"></div><span>Required (OR alt)</span></div>
    <div class="li"><div style="width:20px;height:0;border-top:2px dashed rgba(251,146,60,.7)"></div><span>Concurrent</span></div>
    <div class="li" style="font-size:.55rem;color:var(--mu);margin-top:2px;margin-bottom:5px;font-family:'JetBrains Mono',monospace">↳ wired routing</div>
    <div class="li" style="margin-top:3px"><div class="ld" style="border:1.5px dashed rgba(251,191,36,.5)"></div><span>Special topics</span></div>
    <div class="li"><div class="ld" style="border:1.5px dashed rgba(100,116,139,.36)"></div><span>External dept</span></div>
  </div>
</div>

<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script>
'use strict';
// ─── State ────────────────────────────────────────────────────────────────────
let cy = null, cyPK = null, rawData = null;
let hideSpecial = true, hideExternal = false;

// ─── Colors ───────────────────────────────────────────────────────────────────
const PAL=['#38bdf8','#fb923c','#a78bfa','#34d399','#fbbf24','#f472b6',
           '#60a5fa','#a3e635','#f97316','#22d3ee','#818cf8','#f87171',
           '#2dd4bf','#e879f9','#4ade80','#facc15','#fb7185','#67e8f9'];
let dmap={};
const dc=d=>{ if(!dmap[d]) dmap[d]=PAL[Object.keys(dmap).length%PAL.length]; return dmap[d]; };

// ─── Utils ────────────────────────────────────────────────────────────────────
const courseNum=c=>{ const m=(c||'').match(/(\d+)/); return m?parseInt(m[1]):500; };
const isSpecial=c=>{ const n=courseNum(c); return (n>=90&&n<=99)||(n>=190&&n<=199); };
const phId=c=>'__x__'+c;
const isPh=id=>typeof id==='string'&&id.startsWith('__x__');

// ─── I/O ──────────────────────────────────────────────────────────────────────
function onDrop(e){ e.preventDefault(); document.getElementById('dbox').classList.remove('over'); if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); }
function onFile(i){ if(i.files[0]) readFile(i.files[0]); }
function readFile(f){ const r=new FileReader(); r.onload=e=>{try{buildGraph(JSON.parse(e.target.result));}catch(ex){showErr('Invalid JSON: '+ex.message);}}; r.readAsText(f); }
function reloadUI(){ document.getElementById('drop').style.display='flex'; ['ctrl','chips','legend'].forEach(id=>document.getElementById(id).style.display='none'); setPK(false,0); }
function showLoad(m,s=''){document.getElementById('lmsg').textContent=m;document.getElementById('lsub').textContent=s;document.getElementById('loading').style.display='flex';}
function hideLoad(){document.getElementById('loading').style.display='none';}
function showErr(m){const b=document.getElementById('err');b.textContent='⚠ '+m;b.style.display='block';setTimeout(()=>b.style.display='none',6000);hideLoad();}

{id:'CMPSC 11PA',code:'CMPSC 11PA',title:'Programming Language Laboratory: Pascal',department:'CMPSC',units:'1',description:'A self-paced course to allow a student who already possesses working knowledge of at least one programming language an opportunity to learn other languages of interest. Each section studies a different language.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 11PL',code:'CMPSC 11PL',title:'Programming Language Laboratory: PL/1',department:'CMPSC',units:'1',description:'A self-paced course to allow a studen who already possesses a working knowledge of at least one programming language an opportunity to learn other languages of interest. Each section studies a different language.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 11SN',code:'CMPSC 11SN',title:'Programming Language Laboratory: SNOBOL',department:'CMPSC',units:'1',description:'A self-paced course to allow a student who already possesses working knowledge of at least one programming language an opportunity to learn other languages of interest. Each section studies a different language.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 16',code:'CMPSC 16',title:'Problem Solving with Computers I',department:'CMPSC',units:'4',description:'Fundamental building blocks for solving problems using computers. Topics include basic computer organization and programming constructs: memory CPU, binary arithmetic, variables, expressions, statements, conditionals, iteration, functions, parameters, recursion, primitive and composite data types, and basic operating system and debugging tools.',prereqs:{required:[['CMPSC 8', 'ENGR 3', 'ECE 3']],concurrent:[['MATH 3A', 'MATH 2A']]}},
{id:'CMPSC 24',code:'CMPSC 24',title:'Problem Solving with Computers II',department:'CMPSC',units:'4',description:'Intermediate building blocks for solving problems using computers. Topics include intermediate object-oriented programming, data structures, object-oriented design, algorithms for manipulating these data structures and their run-time analyses. Data structures introduced include stacks, queues, lists, trees, and sets.',prereqs:{required:[['CMPSC 16']],concurrent:[['MATH 3B', 'MATH 2B']]}},
{id:'CMPSC 24A',code:'CMPSC 24A',title:'Problem Solving with Computers II',department:'CMPSC',units:'4',description:'Intermediate building blocks for solving problems using computers. Topics include data structures, object-oriented design and development, algorithms for manipulating these data structures and their runtime analyses. Data structures introduced include stacks, queues, lists, trees, and sets.',prereqs:{required:[['CMPSC 16']],concurrent:[['MATH 3B', 'MATH 2B']]}},
{id:'CMPSC 32',code:'CMPSC 32',title:'Object Oriented Design and Implementation',department:'CMPSC',units:'4',description:'Advanced topics in object-oriented computing. Topics include encapsulation, data hiding, inheritance, polymorphism, compilation, linking and loading, memory management, and debugging; recent advances in design and development tools, practices, libraries, and operating system support.',prereqs:{required:[['CMPSC 24']],concurrent:[]}},
{id:'CMPSC 40',code:'CMPSC 40',title:'Foundations of Computer Science',department:'CMPSC',units:'5',description:'Introduction to the theoretical underpinnings of computer science. Topics include propositional predicate logic, set theory, functions and relations, counting, mathematical induction and recursion (generating functions).',prereqs:{required:[['CMPSC 16'], ['MATH 4A']],concurrent:[]}},
{id:'CMPSC 64',code:'CMPSC 64',title:'Computer Organization and Logic Design',department:'CMPSC',units:'4',description:'Assembly language programming and advanced computer organization; Digital logic design topics including gates, combinational circuits, flip-flops, and the design and analysis of sequential circuits.',prereqs:{required:[['CMPSC 16'], ['MATH 3C', 'MATH 4A']],concurrent:[]}},
{id:'CMPSC 90DA',code:'CMPSC 90DA',title:'Special Topics in Computer Science',department:'CMPSC',units:'4',description:'Provides for the study of topics of current interest in computer science: A. Foundations; B. Software Systems; C. Programming Languages and Software Engineering; D. Information Management; E. Architecture; F. Networking; G. Security; H. Scientific Computing; I. Intelligent and Interactive Systems; N. General.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 90DB',code:'CMPSC 90DB',title:'Special Topics in Computer Science',department:'CMPSC',units:'4',description:'Provides for the study of topics of current interest in computer science: A. Foundations; B. Software Systems; C. Programming Languages and Software Engineering; D. Information Management; E. Architecture; F. Networking; G. Security; H. Scientific Computing; I. Intelligent and Interactive Systems; N. General.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 99',code:'CMPSC 99',title:'Independent Studies in Computer Science',department:'CMPSC',units:'0',description:'Independent studies in computer science for advanced students.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 100',code:'CMPSC 100',title:'Introduction to Teaching Methods in Computer Science',department:'CMPSC',units:'4',description:'Designed to train outstanding undergraduates for learning assistant positions in CS courses. Lecture/discussion surveys current research and best practices in CS pedagogy including student development theories, different pedagogical techniques, and methods for assessing learning. Students gain experience working one-on-one with students, fostering positive learning environments, and providing feedback on student work. Students who successfully complete this course will earn units by serving as an apprentice undergraduate learning assistant.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 110',code:'CMPSC 110',title:'Introduction to Research in Computer Science',department:'CMPSC',units:'4',description:'Defining a CS research problem, finding and reading technical papers, oral communication, technical writing, and independent learning. Course participants work in teams as they apprentice with a CS research group to propose an original research problem and write a research proposal.',prereqs:{required:[['CMPSC 40'], ['CMPSC 32']],concurrent:[]}},
{id:'CMPSC 111',code:'CMPSC 111',title:'Introduction to Computational Science',department:'CMPSC',units:'4',description:'Introduction to the numerical algorithms that form the foundations of data science, machine learning, and computational science and engineering. Matrix computation, linear equation systems, eigenvalue and singular value decompositions, numerical optimization. The informed use of mathematical software environments and libraries, such as python/numpy/scipy.',prereqs:{required:[['MATH 4B'], ['MATH 6A'], ['CMPSC 24']],concurrent:[]}},
{id:'CMPSC 130A',code:'CMPSC 130A',title:'Data Structures and Algorithms',department:'CMPSC',units:'4',description:'Data structures and applications with proofs of correctness and analysis. Hash Tables, Priority Queues (heaps); Balanced Search Trees. Graph Traversal techniques and their applications.',prereqs:{required:[['CMPSC 40', 'MATH 8'], ['CMPSC 24', 'CMPSC 9']],concurrent:[['PSTAT 120A', 'ECE 139']]}},
{id:'CMPSC 130B',code:'CMPSC 130B',title:'Data Structures and Algorithms II',department:'CMPSC',units:'4',description:'Design and analysis of computer algorithms. Correctness proofs and solution of recurrence relations. Design techniques; divide and conquer, greedy strategies, dynamic programming. Applications of techniques to problems from several disciplines. NP - completeness.',prereqs:{required:[['CMPSC 130A']],concurrent:[]}},
{id:'CMPSC 138',code:'CMPSC 138',title:'Automata and Formal Languages',department:'CMPSC',units:'4',description:'Formal languages; finite automata and regular expressions; properties of regular languages; pushdown automata and context-free grammars; properties of context-free languages; introduction to Turing machines and computability.',prereqs:{required:[['CMPSC 40']],concurrent:[]}},
{id:'CMPSC 140',code:'CMPSC 140',title:'Parallel Scientific Computing',department:'CMPSC',units:'4',description:'Fundamentals of high performance computing and parallel algorithm design for numerical computation. Topics include parallel architectures and clusters, parallel programming with message-passing libraries and threads, program parallelization methodologies, parallel performance evaluation and optimization, parallel numerical algorithms and applications with different performance tradeoffs.',prereqs:{required:[['MATH 4B'], ['MATH 6A'], ['CMPSC 130A']],concurrent:[]}},
{id:'CMPSC 148',code:'CMPSC 148',title:'Computer Science Project',department:'CMPSC',units:'4',description:'Team-based project development. Topics include software engineering and professional development practices, interface design, advanced library support; techniques for team oriented design and development, testing and test driven development, and software reliability and robustness. Students present and demonstrate final projects.',prereqs:{required:[['CMPSC 32']],concurrent:[]}},
{id:'CMPSC 153A',code:'CMPSC 153A',title:'Hardware/Software Interface',department:'CMPSC',units:'4',description:'Design and coding of embedded programs. Real-time constraints and management of resources. Practical I/O interfaces and protocols, polling, interrupt maintenance, atomic code, blocking and non-blocking tasks. Static and dynamic task scheduling under real-time and limited resource constraints.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 154',code:'CMPSC 154',title:'Computer Architecture',department:'CMPSC',units:'4',description:'Introduction to the architecture of computer systems. Topics include: central processing units, memory systems, channels and controllers, peripheral devices, interrupt systems, software versus hardware tradeoffs.',prereqs:{required:[['CMPSC 32'], ['CMPSC 64']],concurrent:[]}},
{id:'CMPSC 156',code:'CMPSC 156',title:'Advanced Applications Programming',department:'CMPSC',units:'4',description:'Advanced application programming using a high-level, virtual-machine-based language. Topics include generic programming, exception handling, automatic memory management, and application development, management, and maintenance tools, third-party library use, version control, software testing, issue tracking, code review, and working with legacy code.',prereqs:{required:[['CMPSC 24'], ['CMPSC 32']],concurrent:[]}},
{id:'CMPSC 160',code:'CMPSC 160',title:'Translation of Programming Languages',department:'CMPSC',units:'4',description:'Study of the structure of compilers. Topics include: lexical analysis; syntax analysis including LL and LR parsers; type checking; run-time environments; intermediate code generation; and compiler-construction tools.',prereqs:{required:[['CMPSC 64', 'ECE 154', 'ECE 154A'], ['CMPSC 130A'], ['CMPSC 138']],concurrent:[]}},
{id:'CMPSC 162',code:'CMPSC 162',title:'Programming Languages',department:'CMPSC',units:'4',description:'Concepts of programming languages: scopes, parameter passing, storage management; control flow, exception handling; encapsulation and modularization mechanisms; reusability through genericity and inheritance; type systems; programming paradigms (imperative, object-oriented, functional, and others). Emerging programming languages and their development infrastructures.',prereqs:{required:[['CMPSC 130A'], ['CMPSC 138']],concurrent:[]}},
{id:'CMPSC 165A',code:'CMPSC 165A',title:'Artificial Intelligence',department:'CMPSC',units:'4',description:'Introduction to the field of artificial intelligence, which seeks to understand and build intelligent computational systems. Topics include intelligent agents, problem solving and heuristic search, knowledge representation and reasoning, uncertainty and probabilistic reasoning, machine learning, reinforcement learning, and responsible AI.',prereqs:{required:[['CMPSC 130A']],concurrent:[]}},
{id:'CMPSC 165B',code:'CMPSC 165B',title:'Machine Learning',department:'CMPSC',units:'4',description:'Covers the most important techniques of machine learning (ML) and includes discussions of: well-posed learning problems; artificial neural networks; concept learning and general to specific ordering; decision tree learning; genetic algorithms; Bayesian learning; analytical learning; and others.',prereqs:{required:[['CMPSC 130A']],concurrent:[]}},
{id:'CMPSC 170',code:'CMPSC 170',title:'Operating Systems',department:'CMPSC',units:'4',description:'Basic concepts of operating systems. The notion of a process; interprocess communication and synchronization; input-output, file systems, memory management.',prereqs:{required:[['CMPSC 130A']],concurrent:[['CMPSC 154', 'ECE 154A']]}},
{id:'CMPSC 171',code:'CMPSC 171',title:'Distributed Systems',department:'CMPSC',units:'4',description:'Distributed systems architecture, distributed programming, network of computers, message passing, remote procedure calls, group communication, naming and membership problems, asynchrony, logical time, consistency, fault-tolerance, and recovery.',prereqs:{required:[['CMPSC 130A']],concurrent:[]}},
{id:'CMPSC 172',code:'CMPSC 172',title:'Software Engineering',department:'CMPSC',units:'4',description:'Software engineering is concerned with long-term, large-scale programming projects. Software management, cost estimates, problem specification and analysis, system design techniques, system testing and performance evaluation, and system maintenance. Students will design, manage, and implement a medium-sized project.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 174A',code:'CMPSC 174A',title:'Fundamentals of Database Systems',department:'CMPSC',units:'4',description:'Database system architectures, relational data model, relational algebra, relational calculus, SQL, QBE, query processing, integrity constraints (key constraints, referential integrity), database design, ER and object- oriented data model, functional dependence, lossless join and dependency preserving decompositions, Boyce-Codd and Third Normal Forms.',prereqs:{required:[['CMPSC 130A']],concurrent:[]}},
{id:'CMPSC 174B',code:'CMPSC 174B',title:'Design and Implementation Techniques of Database Systems',department:'CMPSC',units:'4',description:'Queries and processing, optimizer, cost models, execution plans, rewriting rules, access methods, spatial indexing; transactions, ACID properties, concurrency control, serializability, two-phase locking, timestamping, logging,checkpointing, transaction abort and commit, crash recovery; distributed databases.',prereqs:{required:[['CMPSC 130B']],concurrent:[]}},
{id:'CMPSC 174N',code:'CMPSC 174N',title:'Introduction to Databases',department:'CMPSC',units:'4',description:'ER/object-oriented data modeling, relational data model, database design, query languages (algebra, calculus, SQL, QBE), updates and views, query processing, integrity constraints (key constraints, referential integrity), functional dependence, Boyce-Codd and Third Normal Forms.',prereqs:{required:[],concurrent:[['CMPSC 130A']]}},
{id:'CMPSC 176A',code:'CMPSC 176A',title:'Introduction to Computer Communication Networks',department:'CMPSC',units:'4',description:'Basic concepts in networking, the OSI model, error detection codes, flow control, routing, medium access control, and high-speed networks.',prereqs:{required:[['CMPSC 32'], ['PSTAT 120A', 'ECE 139']],concurrent:[]}},
{id:'CMPSC 176B',code:'CMPSC 176B',title:'Network Computing',department:'CMPSC',units:'4',description:'Focus on networking and web technologies used in the Internet. The class covers socket programming and web-based techniques that are used to build distributed applications.',prereqs:{required:[['CMPSC 176A']],concurrent:[]}},
{id:'CMPSC 176C',code:'CMPSC 176C',title:'Advanced Topics in Internet Computing',department:'CMPSC',units:'4',description:'General overview of wireless and mobile networking, multimedia, security, multicast, quality of service, IPv6, and web caching. During the second half of the course, one or more of the above are studied in greater detail.',prereqs:{required:[['CMPSC 176A']],concurrent:[]}},
{id:'CMPSC 177',code:'CMPSC 177',title:'Computer Security',department:'CMPSC',units:'4',description:'Introduction to the basics of computer security and privacy. Analysis of technical difficulties of producing secure computer information systems that provide guaranteed controlled sharing. Examination and critique of current systems, methods, certification.',prereqs:{required:[],concurrent:[['CMPSC 170']]}},
{id:'CMPSC 178',code:'CMPSC 178',title:'Introduction to Cryptography',department:'CMPSC',units:'4',description:'An introduction to the basic concepts and techniques of cryptography and cryptanalysis. Topics include: The Shannon Theory, classical systems, the enigma machine, the data encryption standard, public key systems, digital signatures, file security.',prereqs:{required:[['CMPSC 24'], ['CMPSC 40'], ['PSTAT 120A', 'PSTAT 121A', 'ECE 139']],concurrent:[]}},
{id:'CMPSC 180',code:'CMPSC 180',title:'Computer Graphics',department:'CMPSC',units:'4',description:'Overview of OpenGL graphics standard, OpenGL statemachine, other 3D graphics libraries, 3D graphicspipeline, 3D transformations and clipping, colormodel, shading model, shadow algorithms, texturing,curves and curved surfaces, graphics hardware,interaction devices and techniques',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 181',code:'CMPSC 181',title:'Introduction to Computer Vision',department:'CMPSC',units:'4',description:'Overview of computer vision problems and techniques for analyzing the content of images and video. Topics include image formation, edge detection, image segmentation, pattern recognition, texture analysis, optical flow, stereo vision, shape representation and recovery techniques, issues in object recognition, and case studies of practical vision systems.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 182',code:'CMPSC 182',title:'Multimedia Computing',department:'CMPSC',units:'4',description:'Introduction to multimedia and applications. Topics include streaming media, conferencing, webcasting, digital libraries, multimedia system architectures, standards (including JPEG and MPEG), and multimedia storage and retrieval. A key emphasis is on using the internet for delivery of multimedia data. (First offered 2003-2004)',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 184',code:'CMPSC 184',title:'Mobile Application Development',department:'CMPSC',units:'4',description:'An introduction to programming mobile computing devices. Students will learn about and study the shift in software development from desktop to mobile device applications. Topics will include software engineering and design practices, advances in programming practice, and support tools for mobile application development and testing. Students will develop and deploy mobile applications as part of their course work.',prereqs:{required:[['CMPSC 56', 'CMPSC 156'], ['CMPSC 130A']],concurrent:[]}},
{id:'CMPSC 185',code:'CMPSC 185',title:'Human-Computer Interaction',department:'CMPSC',units:'4',description:'The study of human-computer interaction enables system architects to design useful, efficient, and enjoyable computer interfaces. This course teaches the theory, design guidelines, programming practices, and evaluation procedures behind effective human interaction with computers.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 189A',code:'CMPSC 189A',title:'Senior Computer Systems Project',department:'CMPSC',units:'4',description:'This course is the first in the 2-course Computer Science Capstone sequence. Student teams learn about modern software design and engineering techniques and work together to use them and their past educational experiences at UCSB to analyze, specify, design, and prototype innovative solutions to complex, real world problems using computers.',prereqs:{required:[['CMPSC 48', 'CMPSC 56', 'CMPSC 148', 'CMPSC 156', 'CMPSC 172']],concurrent:[]}},
{id:'CMPSC 189B',code:'CMPSC 189B',title:'Senior Computer Systems Project',department:'CMPSC',units:'4',description:'This course is the second in the 2-course Computer Science Capstone sequence. Student teams continue their CMPSC 189A effort by evolving their specifications, design, and prototypes of advanced computer science solutions and systems. The students learn about interfaces, software integration, and testing, and prepare advanced demonstrations for public presentation at the end of the sequence.',prereqs:{required:[['CMPSC 189A']],concurrent:[]}},

{id:'CMPSC 192',code:'CMPSC 192',title:'Projects in Computer Science',department:'CMPSC',units:'0',description:'Projects in computer science for advanced undergraduate students.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 193',code:'CMPSC 193',title:'Internship in Industry',department:'CMPSC',units:'0',description:'Special projects for selected students. Offered in conjunction with selected industrial and research firms and under direct faculty supervision. Written proposal and final report required.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 196',code:'CMPSC 196',title:'Undergraduate Research',department:'CMPSC',units:'0',description:'Research opportunities for undergraduate students. Students will be expected to giveregular oral presentations, actively participate in a weekly seminar, and prepare at least one written report on their research.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 196B',code:'CMPSC 196B',title:'Undergraduate Research',department:'CMPSC',units:'0',description:'Advanced research for undergraduate students, by petition after completing a minimum of 4 units of CMPSC 196 for a letter grade. The student will propose a specific research project and make a public presentation of final results. Evaluation and grade will be based on feedback from faculty advisor and one other faculty member.',prereqs:{required:[],concurrent:[]}},
{id:'CMPSC 199',code:'CMPSC 199',title:'Independent Studies in Computer Science',department:'CMPSC',units:'0',description:'Independent studies in computer science for advanced students.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 1A',code:'ECE 1A',title:'Computer Engineering Seminar',department:'ECE',units:'1',description:'Introductory seminar to expose students to a broad range of topics in computer engineering.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 1B',code:'ECE 1B',title:'Ten Puzzling Problems in Computer Engineering',department:'ECE',units:'1',description:'Gaining familiarity with, and motivation to study, the field of computer engineering, through puzzle-like problems that represent a range of challenges facing computer engineers in their daily problem-solving efforts and at the frontiers of research.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 3',code:'ECE 3',title:'Introduction to Python Programming For Engineers',department:'ECE',units:'4',description:'This course represents a comprehensive foundation for core ECE topics in signal processing, image analysis, machine learning, optimization and control. The lectures present concepts from linear algebra, such as matrix computations, systems of linear equations, eigenspace decomposition, inner-product, orthogonality, least-squares and linear regression. Students actively engage with the technical materials with an introduction to Python programming and associated hands-on sessions. The materials are be motivated by real-world scenarios ranging from medical imaging to autonomous vehicles, from (miscarriage of) justice to brain-machine interfaces, from music analysis to GPS design.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 5',code:'ECE 5',title:'Introduction to Electrical & Computer Engineering',department:'ECE',units:'4',description:'Aims at exposing freshmen students to the different sub-fields within Electrical and Computer Engineering. Composed of lectures by different faculty members and a weekly laboratory based on projects that are executed using the Arduino environment.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 10A',code:'ECE 10A',title:'Foundations of Analog and Digital Circuits & Systems',department:'ECE',units:'3',description:'The objective of the course is to establish the foundations of analog and digital circuits. The course will introduce the student to the power of abstraction, resistive networks, network analysis, nonlinear analysis and the digital abstraction.',prereqs:{required:[['MATH 2A', 'MATH 3A', 'MATH 3AH'], ['MATH 4A', 'MATH 4AI', 'MATH 3C'], ['PHYS 3']],concurrent:[['MATH 4B', 'MATH 4BI', 'MATH 5A'], ['PHYS 7B', 'PHYS 23']]}},
{id:'ECE 10AL',code:'ECE 10AL',title:'Foundations of Analog and Digital Circuits and Systems Lab',department:'ECE',units:'2',description:'The goal of 10AL is to provide the student with a hands-on application of the concepts discussed in ECE 10A. The lab will introduce the use of microcontrollers as a data acquisition system, network analysis, resistors, nonlinear analysis and digital abstraction.',prereqs:{required:[],concurrent:[['ECE 10A']]}},
{id:'ECE 10B',code:'ECE 10B',title:'Foundations of Analog and Digital Circuits and Systems',department:'ECE',units:'3',description:'The objective of the course is to introduce the MOSFET both as a simple digital switch and as controlled current source for analog design. The course will cover basic digital design, small-signal analysis, charge storage elements and operational amplifiers.',prereqs:{required:[['ECE 10A']],concurrent:[]}},
{id:'ECE 10BL',code:'ECE 10BL',title:'Foundations of Analog and Digital Circuits and Systems Lab',department:'ECE',units:'2',description:'The goal of 10BL is to provide the student with a hands-on application of the concepts discussed in ECE 10B. The lab will utilize the microcontroller to introduce students to the understanding of datasheets for both digital and analog circuits, single-stage amplifier design and basic instrumentation.',prereqs:{required:[],concurrent:[['ECE 10B']]}},
{id:'ECE 10C',code:'ECE 10C',title:'Foundations of Analog and Digital Circuits and Systems',department:'ECE',units:'3',description:'The objective of the course is to introduce the student to the basics of transient analysis. The course will energy and power dissipation in digital circuits, first-order and second-order linear time invariant circuits, sinusoidal steady state, impedance representation, feedback and resonance.',prereqs:{required:[['ECE 10B']],concurrent:[]}},
{id:'ECE 10CL',code:'ECE 10CL',title:'Foundations of Analog and Digital Circuits and Systems Lab',department:'ECE',units:'2',description:'The goal of 10CL is to provide the student with a hands-on application of the concepts discussed in ECE 10C. The lab will utilize the microcontroller to introduce students to the understanding of propagation delay in digital circuits and the resulting power dissipation, first order linear networks, second order linear networks, sinusoidal steady-state, impedance analysis and op-amp circuits.',prereqs:{required:[],concurrent:[['ECE 10C']]}},
{id:'ECE 15A',code:'ECE 15A',title:'Fundamentals of Logic Design',department:'ECE',units:'4',description:'Boolean algebra, logic of propositions, minterm and maxterm expansions, Karnaugh maps, Quine-McCluskey method, melti-level circuits, combinational circuit design and simulation, multiplexers, decoders, programmable logic devices.',prereqs:{required:[],concurrent:[]}},

{id:'ECE 96',code:'ECE 96',title:'Undergraduate Research',department:'ECE',units:'0',description:'Research opportunities for undergraduate students. students will be expected to give regular oral presentations, actively participate in a weekly seminar, and prepare at least one written report on their research.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 120A',code:'ECE 120A',title:'Integrated Circuit Design and Fabrication',department:'ECE',units:'4',description:'Theory, fabrication, and characterization of solid state devices including P-N junctions, capacitors, bipolar and MOS devices. Devices are fabricated using modern VLSI processing techniques including lithography, oxidation, diffusion, and evaporation. Physics and performance of processing steps are discussed and analyzed.',prereqs:{required:[['ECE 132']],concurrent:[]}},
{id:'ECE 120B',code:'ECE 120B',title:'Integrated Circuit Design and Fabrication',department:'ECE',units:'4',description:'Design, simulation, fabrication, and characterization of NMOS integrated circuits. Circuit design and layout is performed using commercial layout software. Circuits are fabricated using modern VLSI processing techniques. Circuit and discrete device electrical performance are analyzed.',prereqs:{required:[['ECE 120A', 'ECE 124B']],concurrent:[]}},
{id:'ECE 122A',code:'ECE 122A',title:'VLSI Principles',department:'ECE',units:'4',description:'Introduction to CMOS digital VLSI design: CMOS devices and manufacturing technology; transistor level design of static and dynamic logic gates and components and interconnections; circuit characterization: delay, noise margins, and power dissipation; combinational and sequential circuits; arithmetic operations and memories.',prereqs:{required:[['ECE 152A']],concurrent:[]}},
{id:'ECE 122B',code:'ECE 122B',title:'VLSI Architecture and Design',department:'ECE',units:'4',description:'Practical issues in VLSI circuit design, pad/pin limitations, clocking and interfacing standards, electrical packaging for high-speed and high-performance design. On-chip noise and crosstalk, clock and power distribution, architectural and circuit design constraints, interconnection limits and transmission line effects.',prereqs:{required:[['ECE 124A', 'ECE 123', 'ECE 122A']],concurrent:[]}},
{id:'ECE 123',code:'ECE 123',title:'High-Performance Digital Circuit Design',department:'ECE',units:'4',description:'Introduction to high-performance digital circuit design techniques. Basics of device physics including deep submicron effects; device sizing and logical effort; Circuit design styles; clocking & timing issues; memory & datapath design; Low-power design; VLSI design flows and associated EDA tools.',prereqs:{required:[['ECE 10A'], ['ECE 10AL', 'ECE 10BL', 'ECE 10CL', 'ECE 2A']],concurrent:[]}},
{id:'ECE 125',code:'ECE 125',title:'High Speed Digital Integrated Circuit Design',department:'ECE',units:'4',description:'Advanced digital VLSI design: CMOS scaling, nanoscale issues including variability, thermal management, interconnects, reliability; non-clocked, clocked and self-timed logic gates; clocked storage elements; high-speed components, PLLs and DLLs; clock and power distribution; memory systems; signaling and I/O design; low-power design.',prereqs:{required:[['ECE 124A', 'ECE 137A']],concurrent:[]}},
{id:'ECE 130A',code:'ECE 130A',title:'Signal Analysis and Processing',department:'ECE',units:'4',description:'Analysis of continuous time linear systems in the time and frequency domains. Superposition and convolution. Bilateral and unilateral Laplace transforms. Fourier series and Fourier transforms. Filtering, modulation, and feedback.',prereqs:{required:[['MATH 4B', 'MATH 5A']],concurrent:[]}},
{id:'ECE 130B',code:'ECE 130B',title:'Signal Analysis and Processing',department:'ECE',units:'4',description:'Analysis of discrete time linear systems in the time and frequency domains. Z transforms, Discrete Fourier transforms. Sampling and aliasing.',prereqs:{required:[['ECE 130A']],concurrent:[]}},
{id:'ECE 130C',code:'ECE 130C',title:'Introduction to Applied Linear Algebra',department:'ECE',units:'4',description:'Introduction to applied linear algebra: matrix arithmetic, vector spaces, orthogonality, matrix factorizations, determinants, eigenvalues and eigenvectors, difference and differential equations.',prereqs:{required:[['MATH 4B', 'MATH 5A']],concurrent:[]}},
{id:'ECE 132',code:'ECE 132',title:'Introduction to Solid-State Electronic Devices',department:'ECE',units:'4',description:"Electrons and holes in semiconductors; doping (P and N); state occupation statistics, transport properties of electrons and holes; P-N junction diodes; I-V, C-V, and switching properties of P-N junctions; introduction of bipolar transitors, MOSFET's and JFET's.",prereqs:{required:[['PHYS 4', 'PHYS 24', 'PHYS 7D'], ['MATH 4B'], ['MATH 4BI', 'MATH 5A']],concurrent:[]}},
{id:'ECE 134',code:'ECE 134',title:'Introduction to Fields and Waves',department:'ECE',units:'4',description:'Introduction to applied electromagnetics and wave phenomena in high frequency electron circuits and systems. Waves on transmission-lines, elements of electrostatics and magnetostatics and applications, plane waves, examples and applications to RF, microwave, and optical systems.',prereqs:{required:[['PHYS 3', 'PHYS 23', 'PHYS 7B'], ['PHYS 4', 'PHYS 24', 'PHYS 7C'], ['MATH 4B', 'MATH 4BI', 'MATH 5A'], ['MATH 5B', 'MATH 6A', 'MATH 6AI'], ['MATH 5C', 'MATH 6B']],concurrent:[]}},
{id:'ECE 135',code:'ECE 135',title:'Optical Fiber Communications',department:'ECE',units:'4',description:'Optical fiber as a transmission medium, dispersion and nonlinear effects in fiber transmission, fiber and semiconductor optical amplifiers and lasers, optical modulators, photo detectors, optical receivers, wavelength division multiplexing components, optical filters, basic transmission system analysis and design.',prereqs:{required:[['ECE 132'], ['ECE 134']],concurrent:[]}},
{id:'ECE 137A',code:'ECE 137A',title:'Circuits and Electronics I',department:'ECE',units:'4',description:'Analysis and design of single stage and multistage transistor circuits including biasing, gain, impedances and maximum signal levels.',prereqs:{required:[['ECE 10A'], ['ECE 10AL', 'ECE 2A'], ['ECE 130A'], ['ECE 132']],concurrent:[]}},
{id:'ECE 137B',code:'ECE 137B',title:'Circuits and Electronics II',department:'ECE',units:'4',description:'Analysis and design of single stage and multistage transistor circuits at low and high frequencies. Transient response. Analysis and design of feedback circuits. Stability criteria.',prereqs:{required:[['ECE 10C'], ['ECE 10CL', 'ECE 2C'], ['ECE 137A']],concurrent:[]}},
{id:'ECE 139',code:'ECE 139',title:'Probability and Statistics',department:'ECE',units:'4',description:'Fundamentals of probability, conditional probability, Bayes rule, random variables, functions of random variables, expectation and high-order moments, Markov chains, hypothesis testing.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 141A',code:'ECE 141A',title:'Introduction to Nanoelectromechanical and Microelectromechanical systems (NEMS/MEMS)',department:'ECE',units:'3',description:'Introduction to nano- and microtechnology. Scaling laws and nanoscale physics are stressed. Individual subjects at the nanoscale including materials, mechanics, photonics, electronics, and fluidics will be described, with an emphasis on differences of behavior at the nanoscale and real-world examples.',prereqs:{required:[['ME 16', 'ME W 16'], ['ME W 17'], ['ME 152A'], ['ECE 130A', 'ECE 137A']],concurrent:[['ME 151A']]}},
{id:'ECE 141B',code:'ECE 141B',title:'MEMS: Processing and Device Characterization',department:'ECE',units:'4',description:'Lectures and laboratory on semiconductor-based processing for MEMS. Description of key equipment and characterization tools used for MEMS and design, fabrication, characterization and testing of MEMS. Emphasis on current MEMS devices including accelerometers, comb drives, micro-reactors and capacitor-actuators.',prereqs:{required:[['ME 141A', 'ECE 141A']],concurrent:[]}},
{id:'ECE 142',code:'ECE 142',title:'INTRODUCTION TO POWER ELECTRONICS',department:'ECE',units:'4',description:'An introduction to modern switched-mode power electronics and associated devices. Covers modern converter/inverter topologies for the control and conversion of electrical power with high efficiency with applications in power supplies, renewable energy systems, lighting, electric/hybrid vehicles, and motor drivers.',prereqs:{required:[['ECE 132'], ['ECE 134'], ['ECE 137A']],concurrent:[]}},
{id:'ECE 144',code:'ECE 144',title:'Electromagnetic Fields and Waves',department:'ECE',units:'4',description:"Waves on transmission lines, Maxwell's equations, skin effect, propagation and reflection of electromagnetic waves, microwave integrated circuit principles, metal and dielectric waveguides, resonant cavities, antennas. Microwave and optical device examples and experiencewith modern microwave and CAD software.",prereqs:{required:[['ECE 134']],concurrent:[]}},
{id:'ECE 145A',code:'ECE 145A',title:'Communication Electronics',department:'ECE',units:'5',description:'RF/Microwave circuits. Transistor, transmission-line, and passive element characteristics. Transmission-line theory and impedance matching. Amplifier design for maximum available gain. Amplifier stability. Gain compression and power limits. Introduction to noise figure, and to intermodulation distortion.',prereqs:{required:[['ECE 137A']],concurrent:[]}},
{id:'ECE 145B',code:'ECE 145B',title:'Communication Electronics II',department:'ECE',units:'5',description:'RF models for CMOS and BJT. Discrete vs. IC implementation. On-chip passive components. LNAs. PAs. T/R switches. Mixers. VCOs. Poly-phase filters Radio link budget. Analog and digital modulation schemes. Introduction to receiver architectures. I&Q modulation. Image-reject architectures.',prereqs:{required:[['ECE 145A']],concurrent:[]}},
{id:'ECE 145C',code:'ECE 145C',title:'Communication Electronics III',department:'ECE',units:'5',description:'Modern wireless communication standards. Cellular phone. Wireless LAN. Introduction to multi-access techniques. Advanced modulation schemes. Interference and distortion. Modern transceiver architectures. Direct conversion vs. low IF vs. super-heterodyne. Sub-sampling receiver. Direct polar modulator. Frequency synthesis using PLL.',prereqs:{required:[['ECE 145B']],concurrent:[]}},
{id:'ECE 146A',code:'ECE 146A',title:'Digital Communication Fundamentals',department:'ECE',units:'5',description:'Signal and channel models, with emphasis on wireless systems; digital modulation; demodulation basics; statistical modeling of noise, including review of probability theory and random variables.',prereqs:{required:[['ECE 130A'], ['ECE 139', 'PSTAT 120A']],concurrent:[]}},
{id:'ECE 146B',code:'ECE 146B',title:'Wireless Communication Systems Design',department:'ECE',units:'5',description:'Optimal demodulation, including signal space geometry; communication performance characterization; advanced wireless communication techniques, including multi-antenna and multicarrier systems; other emerging frontiers in communications.',prereqs:{required:[['ECE 130A'], ['ECE 146A'], ['ECE 139', 'PSTAT 120A']],concurrent:[]}},
{id:'ECE 147A',code:'ECE 147A',title:'Feedback Control Systems - Theory and Design',department:'ECE',units:'5',description:'Feedback systems design, specifications in time and frequency domains. Analysis and synthesis of closed loope systems. Computer aided analysis anddesign.',prereqs:{required:[['ECE 130A']],concurrent:[]}},
{id:'ECE 147B',code:'ECE 147B',title:'Digital Control Systems - Theory and Design',department:'ECE',units:'5',description:'Analysis of sampled data feedback systems; state space description of linear systems: observability, controllability, pole assignment, state feedback, observers. Design of digital control systems.',prereqs:{required:[['ECE 147A']],concurrent:[]}},
{id:'ECE 147C',code:'ECE 147C',title:'Control System Design Project',department:'ECE',units:'5',description:'Students are required to design, implement, and document a significant control systems project. The project is implemented in hardware or in high-fidelity numerical simulators. Lectures and laboratories cover special topics related to the practical implementation of control systems.',prereqs:{required:[['ECE 147A', 'ME 155B', 'ME 173']],concurrent:[]}},
{id:'ECE 148',code:'ECE 148',title:'Applications of Signal Analysis and Processing',department:'ECE',units:'4',description:'A sequence of engineering applications of signal analysis and processing techniques; in communications, image processing, analog and digital filter design, signal detection and parameter estimation, holography and tomography, Fourier optics, and microwave and acoustic sensing.',prereqs:{required:[['ECE 130A'], ['ECE 130B']],concurrent:[]}},
{id:'ECE 150',code:'ECE 150',title:'MOBILE EMBEDDED SYSTEMS',department:'ECE',units:'4',description:'Architectures of modern smartphones and their key hardware components including mobile application processors, communications chips, display, touchscreen, graphics, camera, battery, GPS,and various sensors; the OS and software development platform of smartphones; smartphone applications; low power design techniques.',prereqs:{required:[['ECE 152A']],concurrent:[]}},
{id:'ECE 152A',code:'ECE 152A',title:'Digital Design Principles',department:'ECE',units:'5',description:'Design of synchronous digital systems: timing diagrams, propagation delay, latches and flip-flops, shift registers and counters, Mealy/Moore finite state machines, Verilog, 2-phase clocking, timing analysis, CMOS implementation, S-RAM, RAM-based designs, ASM charts, state minimization.',prereqs:{required:[['ECE 15A', 'ECE 2A'], ['ECE 15A', 'ECE 10A', 'ECE 10AL'], ['CMPSC 30'], ['CMPSC 64']],concurrent:[]}},
{id:'ECE 153A',code:'ECE 153A',title:'Hardware/Software Interface',department:'ECE',units:'4',description:'Design and coding of embedded programs. Real-time constraints and management of resources. Practical I/O interfaces and protocols, polling, interrupt maintenance, atomic code, blocking and non-blocking tasks. Static and dynamic task scheduling under real-time and limited resource constraints.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 153B',code:'ECE 153B',title:'Sensor and Peripheral Interface Design',department:'ECE',units:'4',description:'Hardware description languages; field-programmable logic and ASIC design techniques. Mixed-signal techniques: A/D and D/A converter interfaces; video and audio signal acquisition, processing and generation, communication and network interfaces.',prereqs:{required:[['ECE 152A']],concurrent:[]}},
{id:'ECE 154A',code:'ECE 154A',title:'Introduction to Computer Architecture',department:'ECE',units:'4',description:'Instruction-set architecture (ISA) and computer performance; Machine instructions, assembly, addressing modes; Memory map,arrays, pointers; Procedure calls; Number formats; Simple ALUs; Data path,control, microprogram; Buses, I/O programming, interrupts; Pipelined data paths and control schemes.',prereqs:{required:[['ECE 152A']],concurrent:[]}},
{id:'ECE 154B',code:'ECE 154B',title:'Advanced Computer Architecture',department:'ECE',units:'4',description:'ISA variations; Pipeline data and controlhazards; Fast ALU design; Instruction-level parallelism, multithreading, VLIW; Vector and array processing, multi/many-core chips; Cache and virtual memory; Disk arrays; Shared- and distributed-memory systems, supercomputers; Reconfigurable and application-specific circuits.',prereqs:{required:[['ECE 154A']],concurrent:[]}},
{id:'ECE 157A',code:'ECE 157A',title:'Machine Learning in Design and Test Automation',department:'ECE',units:'4',description:'Introduces the various machine learning techniques and how they are utilized to improve hardware design and test automation processes. The potential benefits and theoretical barriers for implementing a machine learning solution in practice are explained.',prereqs:{required:[['ECE 152A']],concurrent:[]}},
{id:'ECE 157B',code:'ECE 157B',title:'Artificial Intelligence in Design and Test Automation',department:'ECE',units:'4',description:'Introduces an artificial intelligence system view to apply machine learning in design and test automation processes. The various components for building an Intelligent Engineering Assistant (IEA) to perform an engineering task in an industrial setting are explained.',prereqs:{required:[['ECE 157A']],concurrent:[]}},
{id:'ECE 158',code:'ECE 158',title:'Digital Signal Processing',department:'ECE',units:'4',description:'Digital Signal Processing, with Applications: The Fast Fourier transform, discrete cosine transform, and multirate digital signal processing techniques, with applications to digital cellular communications and wireless access points, and audio, voice, still image, video, and biological signal analysis, recognition and compression.',prereqs:{required:[['ECE 130A']],concurrent:[]}},
{id:'ECE 160',code:'ECE 160',title:'Multimedia Systems',department:'ECE',units:'4',description:'Introduction to multimedia and applications, including WWW, image/video databases and video streaming. Covers media content analysis, media data organization and indexing (image/video databases), and media data distribution and interaction (video on-demand and interactive TV).',prereqs:{required:[],concurrent:[]}},
{id:'ECE 162A',code:'ECE 162A',title:'The Quantum Description of Electronic Materials',department:'ECE',units:'4',description:"Electrons as particles and waves, Schrodinger's equation and illustrative solutions. Tunnelling. Atomic structure, the exclusion principle and the periodic table. Bonds. Free electrons in metals, periodic potentials and energy bands.",prereqs:{required:[['ECE 130A'], ['ECE 134']],concurrent:[]}},
{id:'ECE 162B',code:'ECE 162B',title:'Fundamentals of the Solid State',department:'ECE',units:'4',description:'Crystal lattices and the structure of solids, with emphasis on semiconductors. Lattice vibrations. Electronic states and energy bands. Electrical and thermal conduction. Dielectric and optical properties. Semiconductor devices: diffusion, P-N junctions and diode behavior.',prereqs:{required:[['ECE 162A']],concurrent:[]}},
{id:'ECE 162C',code:'ECE 162C',title:'Optoelectronic Materials and Devices',department:'ECE',units:'4',description:"Optical transitions in solids. Direct and indirect gap semiconductors. Luminescence. Excitons and photons. Fundamentals of optoelectronic devices: semiconductor lasers, Led's photoconductors, solar cells, photo diodes, modulators. Photoemission. Integrated circuits.",prereqs:{required:[['ECE 162A']],concurrent:[]}},
{id:'ECE 178',code:'ECE 178',title:'Introduction to Digital Image and Video Processing',department:'ECE',units:'4',description:'Basic concepts in image and video processing. Topics include image formation and sampling, image transforms, image enhancement, and image and video compression including JPEG and MPEG coding standards.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 179D',code:'ECE 179D',title:'Introduction to Robotics: Dynamics and Control',department:'ECE',units:'4',description:'Dynamic modeling and control methods for robotic systems. Lagrangian method for deriving equations of motion, introduction to the Jacobian, and modeling and control of forces and contact dynamics at a robotic end effector. Laboratories encourage a problem-solving approach to control.',prereqs:{required:[['ECE 130A', 'ME 103']],concurrent:[]}},
{id:'ECE 179P',code:'ECE 179P',title:'Introduction to Robotics: Planning and Kinematics',department:'ECE',units:'4',description:'Motion planning and kinematics topics with an emphasis on geometric reasoning, programming, and matrix computations. Motion planning: configuration spaces, sensor-based planning, decomposition and sampling methods, and advanced planning algorithms. Kinematics: reference frames, rotations and displacements, kinematic motion models.',prereqs:{required:[['ENGR 3']],concurrent:[['ME 17', 'ECE 130C', 'ME 170A', 'ECE 181A']]}},
{id:'ECE 181',code:'ECE 181',title:'Introduction to Computer Vision',department:'ECE',units:'4',description:'Overview of computer vision problems and techniques for analyzing the content of images and video. Topics include image formation, edge detection, image segmentation, pattern recognition, texture analysis, optical flow, stereo vision, shape representation and recovery techniques, issues in object recognition, and case studies of practical vision systems.',prereqs:{required:[],concurrent:[]}},
{id:'ECE 183',code:'ECE 183',title:'Nonlinear Phenomena',department:'ECE',units:'4',description:'An introduction to nonlinear phenomena. Flows and bifurcations in one and two dimensions, chaos, fractals, strange attractors. Applications to physics, engineering, chemistry, and biology.',prereqs:{required:[['PHYS 105A', 'PHYS 103'], ['ME 163']],concurrent:[]}},
{id:'ECE 188A',code:'ECE 188A',title:'Senior Electrical Engineering Project',department:'ECE',units:'4',description:'Student groups design a significant project based on the knowledge and skills acquired in earlier coursework and integrate their technical knowledge through a practical design experience. The project is evaluated through written reports, oral presentations, and demonstrations of performance.',prereqs:{required:[],concurrent:[['ECE 153A', 'ECE 153B']]}},
{id:'ECE 188B',code:'ECE 188B',title:'Senior Electrical Engineering Project',department:'ECE',units:'4',description:'Student groups design a significant project based on the knowledge and skills acquired in earlier coursework and integrate their technical knowledge through a practical design experience. The project is evaluated through written reports, oral presentations, and demonstrations of performance.',prereqs:{required:[['ECE 188A']],concurrent:[]}},
{id:'ECE 188C',code:'ECE 188C',title:'Senior Electrical Engineering Project',department:'ECE',units:'4',description:'Student groups design a significant project based on the knowledge and skills acquired in earlier coursework and integrate their technical knowledge through a practical design experience. The project is evaluated through written reports, oral presentations, and demonstrations of performance.',prereqs:{required:[['ECE 188B']],concurrent:[]}},
{id:'ECE 189A',code:'ECE 189A',title:'Senior Computer Systems Project',department:'ECE',units:'4',description:'Student groups design a significant computer-based project. The focus will be on designing a significant project based on the knowledge and skills acquired in earlier coursework. Groups work independently with interaction among groups via interface specifications and informal meetings. The project is evaluated through successful completion of milestones and individual/group project reports and presentations.',prereqs:{required:[['ECE 153B']],concurrent:[]}},
{id:'ECE 189B',code:'ECE 189B',title:'Senior Computer Systems Project',department:'ECE',units:'4',description:'Student groups design a significant computer-based project. Focus will be on building and implementing an embedded hardware system. Each group works independently. The project is evaluated through project reports, achieving milestones and through successful demonstration of hardware functionality.',prereqs:{required:[['ECE 189A']],concurrent:[]}},
{id:'ECE 189C',code:'ECE 189C',title:'Senior Computer Systems Project',department:'ECE',units:'4',description:'Student groups design a significant computer-based project. The focus in this course will be on the integration of both hardware and software components. Students continue to work in groups. Apart from project reports and presentations, the evaluation will be based on successful demonstration of both hardware and software aspects of the project.',prereqs:{required:[['ECE 189B']],concurrent:[]}},
