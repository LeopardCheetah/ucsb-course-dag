{id:'MATH 2A',code:'MATH 2A',title:'Calculus with Algebra and Trigonometry',department:'MATH',units:'5',description:'Math 3A with precalculus: A function approach integrating algebra, trigonometry, and differential calculus. Topics include: one-on-one and onto functions; inverse functions; properties and graphs of polynomial, rational, exponential, and logarithmic functions; properties and graphs of trigonometric functions; analytic geometry; functions and limits; derivatives; techniques and applications of differentiation; introduction to integration; logarithmic and trigonometric functions.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 2B',code:'MATH 2B',title:'Calculus with Algebra and Trigonometry',department:'MATH',units:'5',description:'Math 3B with precalculus: A continued review of relevant topics from precalculus (see Math 2A); integral calculus, including definite and indefinite integrals; techniques of integration, introduction to sequences and series; with applications in mathematics and physics.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 3A',code:'MATH 3A',title:'Calculus with Applications, First Course',department:'MATH',units:'4',description:'Differential Calculus including analytic geometry, functions and limits, derivatives, techniques and applications of differentiation; introduction to integration; logarithmic and trigonometric functions.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 3B',code:'MATH 3B',title:'Calculus with Applications, Second Course',department:'MATH',units:'4',description:'Integral calculus including definite and indefinite integrals, techniques of integration; introduction to sequences and series; with applications in mathematics and physics.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 4A',code:'MATH 4A',title:'Linear Algebra with Applications',department:'MATH',units:'4',description:'Systems of linear equations, matrix algebra, determinants, vector spaces and subspaces, basis and dimension, linear transformations, eigenvalues and eigenvectors, diagonalization, and orthogonality.',prereqs:{required:[['MATH 2B', 'MATH 3B', 'MATH 3BI']],concurrent:[]}},
{id:'MATH 4AI',code:'MATH 4AI',title:'Inquiry Based Linear Algebra',department:'MATH',units:'4',description:'Honors version of Mathematics 4A. Mathematical inquiry course is developed through problem solving and discovery.',prereqs:{required:[['MATH 3B', 'MATH 3BI']],concurrent:[]}},
{id:'MATH 4B',code:'MATH 4B',title:'Differential Equations',department:'MATH',units:'4',description:'First and second order differential equations, separation of variables, linear differential equations, systems of first order equations, nonlinear differential equations and stability.',prereqs:{required:[['MATH 4A', 'MATH 4AI']],concurrent:[]}},
{id:'MATH 4BI',code:'MATH 4BI',title:'Inquiry Based Differential Equations',department:'MATH',units:'4',description:'Honors version of Mathematics 4B. Mathematical inquiry course is developed through problem solving and discovery.',prereqs:{required:[['MATH 3C'], ['MATH 3CI'], ['MATH 4A'], ['MATH 4AI']],concurrent:[]}},
{id:'MATH 6A',code:'MATH 6A',title:'Vector Calculus with Applications, First Course',department:'MATH',units:'4',description:'Calculus of functions of several variables, vector valued functions of one variable, derivative and integrals of vector functions, double and triple integrals, properties and applications of integrals, change of variables.',prereqs:{required:[['MATH 4A', 'MATH 4AI']],concurrent:[]}},
{id:'MATH 6B',code:'MATH 6B',title:'Vector calculus with Applications, Second Course',department:'MATH',units:'4',description:'Scalar and vector fields, integration along paths, integration over surfaces and solid regions, integral theorems of vector calculus, Fourier series, partial differential equations.',prereqs:{required:[['MATH 4B', 'MATH 4BI'], ['MATH 6A']],concurrent:[]}},
{id:'MATH 7H',code:'MATH 7H',title:'Honors Seminar-Calculus',department:'MATH',units:'1',description:'Emphasizing fundamental concepts and applications. Intended for highly motivated and well prepared students.',prereqs:{required:[],concurrent:[['MATH 3A', 'MATH 3B', 'MATH 3BI', 'MATH 3C', 'MATH 4A', 'MATH 4AI', 'MATH 4B', 'MATH 4BI', 'MATH 5A', 'MATH 5AI', 'MATH 6A', 'MATH 6AI', 'MATH 6B']]}},
{id:'MATH 8',code:'MATH 8',title:'Transition to Higher Mathematics',department:'MATH',units:'5',description:'Introduction to the elements of propositional logic, techniques of mathematical proof, and fundamental mathematical structures, including sets, functions, relations, and other topics as time permits. Mastery of this material is essential for students planning to major in mathematics.',prereqs:{required:[['MATH 4A', 'MATH 4AI', 'MATH 4B', 'MATH 4BI', 'MATH 6A', 'MATH 6B']],concurrent:[]}},
{id:'MATH 34A',code:'MATH 34A',title:'Calculus for Social and Life Sciences',department:'MATH',units:'4',description:'Introduction to differential and integral calculus with applications to modeling in the biological sciences.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 34B',code:'MATH 34B',title:'Calculus for Social and Life Sciences',department:'MATH',units:'4',description:'Continued study of differential and integral calculus with differential andintegral calculus with applications. Introduction to mathematical modeling with differential equations. Calculus of several variables including an introduction to partial derivatives.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 94',code:'MATH 94',title:'Group Studies in Mathematics',department:'MATH',units:'1',description:'Lectures and discussions on special topics. Designed for transfer students only.',prereqs:{required:[['MATH 4A', 'MATH 4AI', 'MATH 4B', 'MATH 4BI', 'MATH 6A', 'MATH 6B']],concurrent:[]}},
{id:'MATH 100A',code:'MATH 100A',title:'Mathematics for Elementary Teaching, I',department:'MATH',units:'3',description:'This class teaches ways to think about and explain elementary school mathematics. Topics include: cultural and base-n number systems, algorithms, elementary number theory, probability, and graphing.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 100B',code:'MATH 100B',title:'Mathematics for Elementary Teaching, II',department:'MATH',units:'3',description:'Completes the explanation of elementary school mathematics by discussing geometry and algebra. Discusses the pedagogy with the California mathematics framework, the NCTM standards, and "replacement units".',prereqs:{required:[['MATH 100A']],concurrent:[]}},
{id:'MATH 101A',code:'MATH 101A',title:'Classical Number Systems',department:'MATH',units:'4',description:'A development of classical number systems starting with natural numbers and progressing through the integral, rational, real and complex number systems. Includes an introduction to number theory, mathematical induction, the fundamental theorem of arithmetic and the Euclidean algorithm. Especially suitable for prospective middle and high school teachers.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 101B',code:'MATH 101B',title:'Mathematical Systems',department:'MATH',units:'4',description:'The theory of operations within rings and fields. Polynomials, the fundamental theorem of algebra and other factorization theorems. Analyzing linear, polynomial, rational and exponential functions. Solving algebraic equations and inequalities. Especially suitable for prospective middle and high school teachers.',prereqs:{required:[['MATH 101A']],concurrent:[]}},
{id:'MATH 102A',code:'MATH 102A',title:'Modern Euclidean and Noneuclidean Geometry',department:'MATH',units:'4',description:'Topics in plane and solid geometry. The axioms of pure, euclidean, projective, and noneuclidean geometry. Transformational geometry (isometries, dilitations, involutions, perspectivities, and projectivities). The history and the historical implications of these developments in geometry. Especially suitable for prospective middle and high school teachers.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 102B',code:'MATH 102B',title:'Modern Euclidean and Noneuclidean Geometry',department:'MATH',units:'4',description:'Topics in plane and solid geometry. The axioms of pure, euclidean, projective, and noneuclidean geometry. Transformational geometry (isometries, dilitations, involutions, perspectivities, and projectivities). The history and the historical implications of these developments in geometry. Especially suitable for prospective middle and high school teachers.',prereqs:{required:[['MATH 102A']],concurrent:[]}},
{id:'MATH 103',code:'MATH 103',title:'Introduction to Group Theory',department:'MATH',units:'4',description:'Permutation groups, cyclic groups, theory of finite groups, group homomorphisms and isomorphisms, and Abelian groups. Applications to number theory and geometry.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 104A',code:'MATH 104A',title:'Introduction Into Numerical Analysis',department:'MATH',units:'4',description:'Numerical methods for the solution of nonlinear equations (Newton method), for integration (quadrature formulas and composite integration), and for the initial value problem for ordinary differential equations (Euler and Kutta methods).',prereqs:{required:[['MATH 4B', 'MATH 4BI'], ['MATH 6A'], ['MATH 6B'], ['MATH 8', 'PSTAT 8'], ['MATH 117'], ['CMPSC 5AA', 'CMPSC 10', 'CMPSC 8', 'CMPSC 16', 'ENGR 3']],concurrent:[]}},
{id:'MATH 104B',code:'MATH 104B',title:'Numerical Analysis',department:'MATH',units:'4',description:'Numerical methods for the solution of systems of linear equations (direct and iteractive methods), and the finite difference methods for boundary value problems for (ordinary and partial) differential equations.',prereqs:{required:[['MATH 104A']],concurrent:[]}},
{id:'MATH 104C',code:'MATH 104C',title:'Advanced Topics in Numerical Analysis',department:'MATH',units:'4',description:'Topics in approximation theory; numerical methods for finding eigenvalues of a matrix; and advanced topics in numerical methods for ordinary and partial differential equations.',prereqs:{required:[['MATH 104B']],concurrent:[]}},
{id:'MATH 108A',code:'MATH 108A',title:'Linear Algebra',department:'MATH',units:'4',description:'Abstract vector spaces and subspaces. Span and linear independence. Basis and dimension. Linear maps. Eigenvalues and eigenvectors.',prereqs:{required:[['MATH 4A'], ['MATH 8']],concurrent:[]}},
{id:'MATH 108B',code:'MATH 108B',title:'Linear Algebra',department:'MATH',units:'4',description:'Diagonalization, inner product spaces, projections, least-squares approximations, invariant factors and elementary divisors, canonical forms, topics from advanced matrix theory, applied linear algebra, and group representation theory.',prereqs:{required:[['MATH 108A']],concurrent:[]}},
{id:'MATH 108C',code:'MATH 108C',title:'Matrix Analysis',department:'MATH',units:'4',description:'Eigenvalues, eigenvectors and similarity; Unitary equivalence and normal matrices; QR factorization; Least squares; Singular Value decomposition; Moore-Penrose generalized inverse; Hermitian and symmetric matrices; Variational characterization of eigenvalues; Positive definite matrices; Nonnegative matrices; Perron-Frobenius Theorem.',prereqs:{required:[['MATH 108A']],concurrent:[]}},
{id:'MATH 111A',code:'MATH 111A',title:'Abstract Algebra',department:'MATH',units:'4',description:'An introduction to group theory, focusing on finite groups. Basic algebraic concepts including homomorphisms, normal subgroups, quotients, direct products and group actions. Classification of finitely generated Abelian groups. Other topics such as semidirect products and Sylow theorems as time permits.',prereqs:{required:[['MATH 108A']],concurrent:[]}},
{id:'MATH 111B',code:'MATH 111B',title:'Abstract Algebra',department:'MATH',units:'4',description:'Ring theory, ideals, factorization. Examples include number rings and polynomial rings. Module theory if time permits.',prereqs:{required:[['MATH 111A']],concurrent:[]}},
{id:'MATH 111C',code:'MATH 111C',title:'Abstract Algebra',department:'MATH',units:'4',description:'Fields, field extensions, Galois theory.',prereqs:{required:[['MATH 111B']],concurrent:[]}},
{id:'MATH 113',code:'MATH 113',title:'Non-euclidean Geometry',department:'MATH',units:'4',description:'An introduction to hyperbolic geometry with some discussion of other non-euclidean systems.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 114',code:'MATH 114',title:'Computational Tools for Numerical Analysis',department:'MATH',units:'4',description:'Introduction to programming with specific examples in scientific computing. The algorithms used will be analyzed in detail in Math 104A-B-C. The emphasis will be the translation of numerical algorithms into actual working code.',prereqs:{required:[['MATH 6B'], ['MATH 8'], ['MATH 108A', 'MATH 117']],concurrent:[]}},
{id:'MATH 115A',code:'MATH 115A',title:'Introduction to Number Theory',department:'MATH',units:'4',description:'Number-theoretic functions, divisibility, congruences, primitive roots and indices, quadratic residues and the quadratic reciprocity law.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 115B',code:'MATH 115B',title:'Introduction to Number Theory',department:'MATH',units:'4',description:'Selected topics at the discretion of the instructor.  Possibilities include (but are not limited to) Diophantine equations, the distribution of primes, number-theoretic methods in cryptography, quadratic forms, continued fractions, algebraic number theory, and partitions.',prereqs:{required:[['MATH 115A']],concurrent:[]}},
{id:'MATH 115C',code:'MATH 115C',title:'Topics in Number Theory',department:'MATH',units:'4',description:'Selected topics in number theory at the direction of the instructor.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 116',code:'MATH 116',title:'Combinatorial Analysis',department:'MATH',units:'4',description:'Elementary counting principles, binomial coefficients, generating functions, recurrence relations, the principle of inclusion and exclusion, distributions and partitions, systems of distinct representatives, applications to computation.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 117',code:'MATH 117',title:'Methods of Analysis',department:'MATH',units:'4',description:'Introduction to methods of proof in analysis. topics include limits, sequences and series, continuity, compactness, as well as other topics. This course is intended to follow Mathematics 8 and to introduce students to the level of sophistication of upper-division mathematics.',prereqs:{required:[['MATH 8', 'PSTAT 8']],concurrent:[]}},
{id:'MATH 118A',code:'MATH 118A',title:'Real Analysis',department:'MATH',units:'4',description:'Axioms of the real numbers, topology of metric spaces, numerical sequences, infinite series.',prereqs:{required:[['MATH 4B'], ['MATH 6A'], ['MATH 108A'], ['MATH 117']],concurrent:[]}},
{id:'MATH 118B',code:'MATH 118B',title:'Real Analysis',department:'MATH',units:'4',description:'Real functions: continuity, differentiability, Riemann integrals, power and trigonometric series.',prereqs:{required:[['MATH 108B'], ['MATH 118A']],concurrent:[]}},
{id:'MATH 118C',code:'MATH 118C',title:'Real Analysis',department:'MATH',units:'4',description:'Multivariable calculus and a selection of other topics including differential forms or Lebesgue integral.',prereqs:{required:[['MATH 118B']],concurrent:[]}},
{id:'MATH 119A',code:'MATH 119A',title:'Ordinary Differential Equations',department:'MATH',units:'4',description:'Existence, uniqueness, and stability; the geometry of phase space; linear systems and hyperbolicity; maps and diffeomorphisms.',prereqs:{required:[['MATH 4B', 'MATH 4BI'], ['MATH 6A'], ['MATH 8']],concurrent:[]}},
{id:'MATH 119B',code:'MATH 119B',title:'Chaotic Dynamics and Bifurcation Theory',department:'MATH',units:'4',description:'Hyperbolic structure and chaos; center manifolds; bifurcation theory; and the Feigenbaum and Ruelle-Takens cascades to strange attractors.',prereqs:{required:[['MATH 6B'], ['MATH 119A']],concurrent:[]}},
{id:'MATH 122A',code:'MATH 122A',title:'Theory of Complex Variables',department:'MATH',units:'4',description:'Complex numbers, complex differentiation, analytic functions, Cauchy-Riemann equations, Taylor and Laurent series, classification of singular points, residues, evaluation of improper integrals.',prereqs:{required:[['MATH 6A'], ['MATH 8']],concurrent:[]}},
{id:'MATH 122B',code:'MATH 122B',title:'Theory of Complex Variables',department:'MATH',units:'4',description:'The argument principle, Rouche’s theorem, analytic continuation, conformal mapping, fractional transformations and applications, infinite products, harmonic functions.  Other topics at the discretion of the instructor.',prereqs:{required:[['MATH 122A']],concurrent:[]}},
{id:'MATH 124A',code:'MATH 124A',title:'Partial Differential Equations',department:'MATH',units:'4',description:'Wave, heat, and potential equations.',prereqs:{required:[['MATH 4B', 'MATH 4BI'], ['MATH 6A'], ['MATH 6B'], ['MATH 8']],concurrent:[]}},
{id:'MATH 124B',code:'MATH 124B',title:'Fourier Series and Numerical Methods',department:'MATH',units:'4',description:'Fourier series; generalized functions; and numerical methods.',prereqs:{required:[['MATH 4B', 'MATH 4BI'], ['MATH 6A'], ['MATH 6B'], ['MATH 124A']],concurrent:[]}},
{id:'MATH 132A',code:'MATH 132A',title:'Optimization',department:'MATH',units:'4',description:'Global and local optimization, constrained and unconstrained optimization, convex versus nonconvex optimization, Projection Theorem, linear search methods, gradient methods, Newton and Quasi-Newton methods, trust region methods.',prereqs:{required:[['MATH 6A'], ['MATH 108A']],concurrent:[]}},
{id:'MATH 132B',code:'MATH 132B',title:'Operations Research',department:'MATH',units:'4',description:'Large scale optimization, stochastic gradient descent, inexact Newton methods, limited memory BSGF, least squares problems, global optimization, optimization in general normed spaces.',prereqs:{required:[['MATH 132A']],concurrent:[]}},
{id:'MATH 137A',code:'MATH 137A',title:'Graph and Network Theory',department:'MATH',units:'4',description:"Elements of graph and network theory including paths, circuits, trees, coloring, planarity, matching theory, Hall's theorem, applications to scheduling theory, flows in networks, Menger's theorem, and other topics as time permits.",prereqs:{required:[['MATH 4A'], ['MATH 8']],concurrent:[]}},
{id:'MATH 137B',code:'MATH 137B',title:'Spectral Graph Theory',department:'MATH',units:'4',description:'The graph Laplacian, eigenvalues of weighted graphs and random walks, the normalized Laplacian and Cheegers inequality, diameters and eigenvalues, expander graphs, eigenvalues of symmetric graphs, heat kernels.',prereqs:{required:[['MATH 108A'], ['MATH 137A']],concurrent:[]}},
{id:'MATH 145',code:'MATH 145',title:'Introduction to Topology',department:'MATH',units:'4',description:'Metric spaces, continuity, compactness, classification of surfaces, Euler characteristics, and fundamental groups. Additional topics at the discretion of the instructor.',prereqs:{required:[['MATH 8'], ['MATH 108A', 'MATH 117']],concurrent:[]}},
{id:'MATH 147A',code:'MATH 147A',title:'Differential Geometry of Curves and Surfaces',department:'MATH',units:'4',description:'Curves and surfaces in three-dimensional Euclidean space, including Frenet formulas, signed curvature of plane curves, first and second fundamental forms, normal curvature and principal curvature, Gaussian and mean curvature, Gauss equation and Theorema Egregium, and a brief introduction to geodesics if time permits.',prereqs:{required:[['MATH 6A'], ['MATH 108A', 'MATH 117']],concurrent:[]}},
{id:'MATH 147B',code:'MATH 147B',title:'Differential Geometry of Curves and Surfaces',department:'MATH',units:'4',description:'Parallel transport, geodesics, Gauss-Bonnet Theorem, fundamental theorem of surfaces. Additional topics at the discretion of the instructor may include minimal surfaces, Codazzi equation, surfaces of constant Gaussian curvature, isothermal coordinates, and global theorems for curves.',prereqs:{required:[['MATH 6B'], ['MATH 147A']],concurrent:[]}},
{id:'MATH 170',code:'MATH 170',title:'Introduction to Mathematical Finance',department:'MATH',units:'4',description:'Describes mathematical methods for estimating and evaluating asset pricing models, equilibrium and derivative pricing, options, bonds, and the term-structure of interest rates. Also introduces finance optimization models for risk management and financial engineering.',prereqs:{required:[['PSTAT 120A'], ['PSTAT 160A']],concurrent:[]}},
{id:'MATH 181A',code:'MATH 181A',title:'Advanced Problem Solving in Mathematical, Historical and Pedagogical Contexts.',department:'MATH',units:'4',description:'Focuses on the representations, strategies, and language learners use to conceptualize and develop fundamental ideas of mathematics. Includes advanced mathematical problem solving and its implications for teaching and learning at the secondary level. Especially suitable for prospective middle and high school teachers.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 181B',code:'MATH 181B',title:'Advanced Problem Solving in Mathematical, Historical, and Pedagogical Contexts',department:'MATH',units:'4',description:'Continuation of Math 181A or ED 134. Focuses on the representations, strategies, and language learners use to conceptualize and develop fundamental ideas of mathematics. Includes advanced mathematical problem solving and its implications for teaching and learning at the secondary level. Especially suitable for prospective middle and high school teachers.',prereqs:{required:[['MATH 181A', 'ED 134']],concurrent:[]}},
{id:'MATH 182',code:'MATH 182',title:'History of Mathematics',department:'MATH',units:'4',description:'An examination of the major achievements in mathematical thinking throughout history. Topics may include the history of numerical systems in early civilizations, the development of formal proof, mathematical contributions from diverse populations and the impact of technological innovations on mathematics. Especially suitable for prospective middle and high school teachers.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 190',code:'MATH 190',title:'Special Topics in Mathematics',department:'MATH',units:'4',description:'An advanced treatment of mathematics content appropriate for undergraduates.  The material for the course may come from algebra, geometry, analysis, applied mathematics or other areas of mathematics.  Topics vary by instructor.',prereqs:{required:[['MATH 8']],concurrent:[]}},
{id:'MATH 193',code:'MATH 193',title:'Internship in Mathematics',department:'MATH',units:'0',description:'Faculty sponsored academic internship in industrial or research firms.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 194GS',code:'MATH 194GS',title:'Group Studies for Advanced Students',department:'MATH',units:'1',description:'Participants will select a math-related book or papers, read the section before the next meeting and discuss reading at the meeting. Readings may include biographies of mathematicians, histories or popularizations of mathematics, textbooks, and readings in mathematical physics or biology.',prereqs:{required:[],concurrent:[]}},
{id:'MATH 197A',code:'MATH 197A',title:'Senior Thesis',department:'MATH',units:'0',description:'Independent research under the supervision of a faculty member which will result in a senior thesis. Student will concentrate on reading and gathering material for a thesis.',prereqs:{required:[],concurrent:[]}},

// ═══════════════════════════════════════════════════════════════════════════════
// ENTRY POINT
// ═══════════════════════════════════════════════════════════════════════════════
function buildGraph(data){
  rawData=data; dmap={};
  document.getElementById('drop').style.display='none';
  showLoad('ANALYSING…','computing layers & components');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    try{_build();}catch(ex){showErr('Build failed: '+ex.message);console.error(ex);}
  }));
}

// ═══════════════════════════════════════════════════════════════════════════════
// _BUILD  — full graph construction
// ═══════════════════════════════════════════════════════════════════════════════
function _build(){
  let courses = rawData.courses||[];
  if(!courses.length){showErr('No courses found.');return;}
  if(hideSpecial) courses=courses.filter(c=>!isSpecial(c.code||c.id));

  const knownIds=new Set(courses.map(c=>c.id));

  // ── Phantom nodes ────────────────────────────────────────────
  const phantoms={};
  if(!hideExternal){
    courses.forEach(c=>{
      [...(c.prereqs?.required||[]),...(c.prereqs?.concurrent||[])].flat().forEach(pid=>{
        if(!knownIds.has(pid)&&!phantoms[pid])
          phantoms[pid]={id:phId(pid),code:pid,dept:pid.split(' ')[0],
            title:'External prereq',units:0,desc:'Referenced but not in this catalog.',
            special:false,external:true,rawPrereqs:{required:[],concurrent:[]}};
      });
    });
  }

  // ── All nodes ────────────────────────────────────────────────
  const allNodes=[
    ...courses.map(c=>({id:c.id,code:c.code||c.id,dept:c.department||'?',
      title:c.title||'',units:c.units||0,desc:c.description||'',
      special:isSpecial(c.code||c.id),external:false,rawPrereqs:c.prereqs})),
    ...Object.values(phantoms),
  ];
  const nodeSet=new Set(allNodes.map(n=>n.id));
  const nodeMap=Object.fromEntries(allNodes.map(n=>[n.id,n]));
  const rid=pid=>{ if(nodeSet.has(pid))return pid; const p=phId(pid); return nodeSet.has(p)?p:null; };

  // ── Edges ────────────────────────────────────────────────────
  const edges=[],edgeSet=new Set();
  courses.forEach(c=>{
    (c.prereqs?.required||[]).forEach((g,gi)=>g.forEach((pid,pi)=>{
      const src=rid(pid); if(!src) return;
      const eid=`r:${src}=>${c.id}:${gi}`; if(edgeSet.has(eid)) return; edgeSet.add(eid);
      edges.push({id:eid,source:src,target:c.id,etype:'required',orPrimary:pi===0});
    }));
    (c.prereqs?.concurrent||[]).forEach((g,gi)=>g.forEach((pid,pi)=>{
      const src=rid(pid); if(!src) return;
      const eid=`c:${src}=>${c.id}:${gi}`; if(edgeSet.has(eid)) return; edgeSet.add(eid);
      edges.push({id:eid,source:src,target:c.id,etype:'concurrent',orPrimary:pi===0});
    }));
  });

  // ── Topology (required edges only) ───────────────────────────
  const ch={},pa={};
  allNodes.forEach(n=>{ch[n.id]=[];pa[n.id]=[];});
  edges.filter(e=>e.etype==='required').forEach(e=>{
    if(ch[e.source]!==undefined&&pa[e.target]!==undefined){
      ch[e.source].push(e.target); pa[e.target].push(e.source);
    }
  });

  // ── Kahn's topo sort → longest-path depth ────────────────────
  const depth={}, indeg={};
  allNodes.forEach(n=>{depth[n.id]=0; indeg[n.id]=new Set(pa[n.id]).size;});
  const topoQ=allNodes.filter(n=>indeg[n.id]===0).map(n=>n.id);
  const topo=[], inQ=new Set(topoQ);
  let qi=0;
  while(qi<topoQ.length){
    const cur=topoQ[qi++]; topo.push(cur);
    ch[cur].forEach(nxt=>{
      depth[nxt]=Math.max(depth[nxt],depth[cur]+1);
      if(--indeg[nxt]===0&&!inQ.has(nxt)){inQ.add(nxt);topoQ.push(nxt);}
    });
  }
  // Remaining (cycle nodes) get max depth of known parents + 1
  allNodes.forEach(n=>{
    if(depth[n.id]===undefined) depth[n.id]=Math.max(0,...pa[n.id].map(p=>depth[p]||0))+1;
  });

  // ── Descendant count ─────────────────────────────────────────
  const desc={};
  topo.slice().reverse().forEach(id=>{desc[id]=(ch[id]||[]).reduce((s,childId)=>s+1+(desc[childId]||0),0);});

  // ── Connected components (undirected required graph) ──────────
  const uAdj={};
  allNodes.forEach(n=>{uAdj[n.id]=[];});
  edges.filter(e=>e.etype==='required').forEach(e=>{
    if(uAdj[e.source]&&uAdj[e.target]){ uAdj[e.source].push(e.target); uAdj[e.target].push(e.source); }
  });
  const compOf={};
  const comps=[];
  const seen=new Set();
  allNodes.forEach(n=>{
    if(seen.has(n.id)) return;
    const comp=[]; const q=[n.id];
    while(q.length){ const cur2=q.pop(); if(seen.has(cur2)) continue; seen.add(cur2); comp.push(cur2); (uAdj[cur2]||[]).forEach(nb=>q.push(nb)); }
    comps.push(comp); comp.forEach(id=>compOf[id]=comps.length-1);
  });
  if(!comps.length){showErr('No valid courses to display.');return;}
  const mainIdx=comps.reduce((mi,comp,i)=>comp.length>(comps[mi]||[]).length?i:mi,0);
  const mainSet=new Set(comps[mainIdx]||[]);
  const mainNodes=allNodes.filter(n=>mainSet.has(n.id));
  const parkNodes=allNodes.filter(n=>!mainSet.has(n.id));

  // ── Departments ───────────────────────────────────────────────
  const depts=[...new Set(allNodes.map(n=>n.dept))].sort();
  depts.forEach(dc);

  const sel=document.getElementById('dsel');
  const prev=sel.value;
  sel.innerHTML='<option value="">All Depts</option>';
  depts.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  sel.value=depts.includes(prev)?prev:'';

  document.getElementById('ldepts').innerHTML=depts.map(d=>
    `<div class="li"><div class="ld" style="background:${dc(d)}"></div><span>${d}</span></div>`).join('');

  const numLayers=mainNodes.length ? 1+Math.max(0,...mainNodes.map(n=>depth[n.id]||0)) : 1;
  document.getElementById('sn').textContent=courses.length+(Object.keys(phantoms).length?' +'+Object.keys(phantoms).length:'');
  document.getElementById('se').textContent=edges.length;
  document.getElementById('sl').textContent=numLayers;
  document.getElementById('sp').textContent=parkNodes.length;

  // ── Shared style ─────────────────────────────────────────────
  const deptStyles=depts.map(d=>({selector:`node[dept="${d}"]`,style:{'background-color':dc(d)}}));
  const baseStyle=[
    {selector:'node',style:{
      'label':'data(label)',
      'font-family':'JetBrains Mono, monospace',
      'font-size':'8px',
      'color':'#07090f',
      'text-valign':'center','text-halign':'center',
      'shape':'round-rectangle',
      'padding':'6px',
      'background-color':'#334155',
      'border-width':0,
    }},
    ...deptStyles,
    {selector:'node[external="yes"]',style:{'background-color':'transparent','border-width':1.5,'border-style':'dashed','border-color':'rgba(100,116,139,.36)','color':'rgba(100,116,139,.52)','font-size':'7.5px'}},
    {selector:'node[special="yes"]',style:{'border-width':1.5,'border-style':'dashed','border-color':'rgba(251,191,36,.5)'}},
    {selector:'node.hi',style:{'border-width':2.5,'border-color':'#fff','border-style':'solid','z-index':10,'opacity':1}},
    {selector:'node.fa',style:{'opacity':.08}},
    {selector:'edge',style:{
      'width':1.1,'curve-style':'bezier',
      'target-arrow-shape':'triangle','arrow-scale':.66,
      'line-color':'rgba(56,189,248,.32)','target-arrow-color':'rgba(56,189,248,.32)',
    }},
    {selector:'edge[etype="required"][orPrimary="yes"]',style:{'line-color':'rgba(56,189,248,.68)','target-arrow-color':'rgba(56,189,248,.68)','width':1.5}},
    {selector:'edge[etype="required"][orPrimary="no"]',style:{'line-style':'dotted','line-color':'rgba(148,163,184,.18)','target-arrow-color':'rgba(148,163,184,.18)','width':.8}},
    {selector:'edge[etype="concurrent"][orPrimary="yes"]',style:{'line-style':'dashed','line-dash-pattern':[4,3],'line-color':'rgba(251,146,60,.68)','target-arrow-color':'rgba(251,146,60,.68)'}},
    {selector:'edge[etype="concurrent"][orPrimary="no"]',style:{'line-style':'dotted','line-color':'rgba(251,146,60,.2)','target-arrow-color':'rgba(251,146,60,.2)','width':.8}},
    {selector:'edge.hi',style:{'width':2,'z-index':5,'opacity':1}},
    {selector:'edge[etype="required"].hi',style:{'line-color':'rgba(56,189,248,.95)','target-arrow-color':'rgba(56,189,248,.95)','line-style':'solid'}},
    {selector:'edge[etype="concurrent"].hi',style:{'line-color':'rgba(251,146,60,.95)','target-arrow-color':'rgba(251,146,60,.95)'}},
    {selector:'edge.fa',style:{'opacity':.03}},
  ];

  // ══════════════════════════════════════════════════════════════
  // INITIAL POSITIONS — layer Y, dept-sorted X
  // Strategy: pack dept groups tightly within each layer,
  // with the widest layers determining the x-spread.
  // This prevents the spiral artifact by giving every node
  // a sensible starting position before force runs.
  // ══════════════════════════════════════════════════════════════
  const LAYER_H = 160;
  const NODE_W  = 90;
  const H_PAD   = 22;

  // Parse base number + suffix for sequence-aware sort (130A→{base:130,suffix:'A'})
  const parseSuffix=code=>{const m=(code||'').match(/(\d+)([A-Za-z]*)$/);return m?{base:parseInt(m[1]),suffix:m[2].toUpperCase()}:{base:0,suffix:''};};

  // Group nodes by layer, sort: dept → base number → suffix (A<B<C)
  // Keeps sequences like CMPSC 130A/130B/130C adjacent in initial placement
  const byLayer={};
  mainNodes.forEach(n=>{
    const L=depth[n.id];
    if(!byLayer[L]) byLayer[L]=[];
    byLayer[L].push(n);
  });
  Object.values(byLayer).forEach(g=>{
    g.sort((a,b)=>{
      if(a.dept!==b.dept) return a.dept.localeCompare(b.dept);
      const pa=parseSuffix(a.code), pb=parseSuffix(b.code);
      return pa.base!==pb.base ? pa.base-pb.base : pa.suffix.localeCompare(pb.suffix);
    });
  });

  // Compute dept → average layer (for assigning dept a horizontal "home" column)
  const deptAvgLayer={};
  mainNodes.forEach(n=>{
    if(!deptAvgLayer[n.dept]) deptAvgLayer[n.dept]={sum:0,cnt:0};
    deptAvgLayer[n.dept].sum+=depth[n.id]; deptAvgLayer[n.dept].cnt++;
  });
  // Sort depts by avg layer ascending (foundational depts get left columns)
  const sortedDepts=depts.filter(d=>mainNodes.some(n=>n.dept===d))
    .sort((a,b)=>(deptAvgLayer[a]?.sum/deptAvgLayer[a]?.cnt||0)-(deptAvgLayer[b]?.sum/deptAvgLayer[b]?.cnt||0));
  const deptOrder=Object.fromEntries(sortedDepts.map((d,i)=>[d,i]));
  const numDepts=sortedDepts.length||1;
  const DEPT_W=Math.max(240, (NODE_W+H_PAD)*10); // wider initial lane spread

  // Assign initial X based on dept lane + position within layer-dept group
  const initPos={};
  Object.entries(byLayer).forEach(([L,layerNodes])=>{
    // Group by dept within this layer
    const deptGroups={};
    layerNodes.forEach(n=>{
      if(!deptGroups[n.dept]) deptGroups[n.dept]=[];
      deptGroups[n.dept].push(n);
    });
    Object.entries(deptGroups).forEach(([dept,grp])=>{
      const laneX=(deptOrder[dept]||0)*DEPT_W - (numDepts-1)*DEPT_W/2;
      grp.forEach((n,i)=>{
        const offset=(i-(grp.length-1)/2)*(NODE_W+H_PAD);
        initPos[n.id]={x:laneX+offset, y:parseInt(L)*LAYER_H};
      });
    });
  });

  // ── Destroy old cy ───────────────────────────────────────────
  if(cy){try{cy.destroy();}catch(e){}cy=null;}

  if(!mainNodes.length){
    showErr('No connected courses found after filtering.');
    _buildParking(parkNodes, edges, baseStyle, deptStyles);
    hideLoad();
    document.getElementById('ctrl').style.display='flex';
    document.getElementById('chips').style.display='flex';
    document.getElementById('legend').style.display='block';
    return;
  }

  const mainEdgeSet=new Set(mainNodes.map(n=>n.id));
  const mainEdges=edges.filter(e=>mainEdgeSet.has(e.source)&&mainEdgeSet.has(e.target));

  cy=cytoscape({
    container:document.getElementById('main-cy'),
    elements:[
      ...mainNodes.map(n=>({data:{
        id:n.id,label:n.code,title:n.title,dept:n.dept,
        units:n.units,desc:n.desc,
        layer:depth[n.id], descCount:desc[n.id]||0,
        special:n.special?'yes':'no', external:n.external?'yes':'no',
        rawPrereqs:n.rawPrereqs,
      }, position:initPos[n.id]||{x:0,y:0}})),
      ...mainEdges.map(e=>({data:{
        id:e.id,source:e.source,target:e.target,
        etype:e.etype,orPrimary:e.orPrimary?'yes':'no',
      }})),
    ],
    style:baseStyle,
    layout:{name:'preset'},
    wheelSensitivity:.25,minZoom:.03,maxZoom:6,
    textureOnViewport:mainNodes.length>200,
    hideEdgesOnViewport:mainNodes.length>300,
    motionBlur:false,
  });

  showLoad('RELAXING LAYOUT…','minimising edge crossings');

  // ── Run force relaxation then finish ─────────────────────────
  runForce({
    cyInst:cy, nodes:mainNodes, nodeMap,
    depth, LAYER_H, edges:mainEdges,
    onDone:()=>{
      cy.fit(cy.elements(),50);
      _attachEvents(cy, true);

      // Build parking lot
      _buildParking(parkNodes, edges, baseStyle, deptStyles);

      hideLoad();
      document.getElementById('ctrl').style.display='flex';
      document.getElementById('chips').style.display='flex';
      document.getElementById('legend').style.display='block';
      if(sel.value) doFilter();
    }
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// FORCE RELAXATION
// Y is softly clamped to layer. X is free but:
//   - Same-layer nodes repel strongly (elliptical, more horizontal)
//   - Cross-layer nodes repel less
//   - Edge springs attract connected nodes toward same X
//   - Dept cohesion: soft pull toward dept's average X
// ═══════════════════════════════════════════════════════════════════════════════
function runForce({cyInst, nodes, nodeMap, depth, LAYER_H, edges, onDone}){
  const N=nodes.length;
  if(N===0){onDone();return;}
  // Sibling detection helper (same as parseSuffix but local to force closure)
  const parseSfx=code=>{const m=(code||'').match(/(\d+)([A-Za-z]*)$/);return m?{base:parseInt(m[1]),suffix:m[2]}:{base:0,suffix:''};};

  // Physics constants
  const ITERS   = 350;
  const DT      = 0.88;
  const DAMP    = 0.76;
  const K_Y     = 0.20;
  const K_YMAX  = 55;
  const K_REP   = 14000;  // increased to spread dense layers
  const K_EX    = 0.016;  // edge X spring
  const K_EY    = 0.07;   // edge cross-layer Y nudge
  const K_DEPT  = 0.010;  // dept cohesion

  const ids=nodes.map(n=>n.id);

  // Pull dept average X from initial positions
  const deptSumX={}, deptCnt={};
  nodes.forEach(n=>{
    const p=cyInst.getElementById(n.id).position();
    if(!deptSumX[n.dept]){deptSumX[n.dept]=0;deptCnt[n.dept]=0;}
    deptSumX[n.dept]+=p.x; deptCnt[n.dept]++;
  });
  const deptAvgX={};
  Object.keys(deptSumX).forEach(d=>deptAvgX[d]=deptSumX[d]/deptCnt[d]);

  // State arrays for speed
  const px=new Float64Array(N), py=new Float64Array(N);
  const vx=new Float64Array(N), vy=new Float64Array(N);
  const idxOf={};
  nodes.forEach((n,i)=>{
    idxOf[n.id]=i;
    const p=cyInst.getElementById(n.id).position();
    px[i]=p.x; py[i]=p.y;
  });

  // Edge list as index pairs (primary only to avoid chaos)
  const ePairs=[];
  edges.filter(e=>e.orPrimary==='yes'||e.orPrimary===true).forEach(e=>{
    const si=idxOf[e.source], ti=idxOf[e.target];
    if(si!==undefined&&ti!==undefined) ePairs.push([si,ti,e.etype]);
  });

  // Node half-widths: estimate from label length (avg 7.5px/char + 12px padding each side)
  const halfW=nodes.map(n=>Math.max(40, (n.code||n.id).length*4.2+14));
  const halfH=14; // fixed half-height

  // Post-force overlap resolution: runs after simulation converges
  function resolveOverlaps(){
    const PASSES=60, MARGIN=4;
    for(let pass=0;pass<PASSES;pass++){
      let moved=false;
      for(let i=0;i<N;i++){
        for(let j=i+1;j<N;j++){
          const dx=px[i]-px[j], dy=py[i]-py[j];
          const minX=halfW[i]+halfW[j]+MARGIN;
          const minY=halfH*2+MARGIN;
          const overlapX=minX-Math.abs(dx), overlapY=minY-Math.abs(dy);
          if(overlapX>0&&overlapY>0){
            // Resolve along the axis with less overlap needed
            if(overlapX<=overlapY){
              // Push apart horizontally
              const push=(overlapX/2+1)*Math.sign(dx||1);
              px[i]+=push; px[j]-=push;
            } else {
              // Push apart vertically — but only if different layers
              if(depth[nodes[i].id]!==depth[nodes[j].id]){
                const push=(overlapY/2+1)*Math.sign(dy||1);
                py[i]+=push; py[j]-=push;
              } else {
                // Same layer: force horizontal only
                const push=(overlapX/2+1)*Math.sign(dx||1);
                px[i]+=push; px[j]-=push;
              }
            }
            moved=true;
          }
        }
      }
      if(!moved) break;
    }
  }

  let iter=0;
  function step(){
    if(iter>=ITERS){
      resolveOverlaps();
      nodes.forEach((n,i)=>cyInst.getElementById(n.id).position({x:px[i],y:py[i]}));
      onDone(); return;
    }
    const alpha=1-iter/ITERS; // cooling: 1→0
    iter++;

    const fx=new Float64Array(N), fy=new Float64Array(N);

    // ── Layer Y spring ──────────────────────────────────────
    for(let i=0;i<N;i++){
      const ty=(depth[nodes[i].id]||0)*LAYER_H;
      fy[i]+=(ty-py[i])*K_Y*(1+alpha*2);
    }

    // ── Node-node repulsion (O(N²)) ─────────────────────────
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        const dx=px[i]-px[j], dy=py[i]-py[j];
        const d2=dx*dx+dy*dy+0.1;
        const dist=Math.sqrt(d2);
        const sameL=depth[nodes[i].id]===depth[nodes[j].id];
        // Stronger horizontal repulsion in same layer
        const rx=sameL?180:110, ry=sameL?60:90;
        const nd=Math.sqrt((dx/rx)**2+(dy/ry)**2)||0.001;
        if(nd<2.2){
          const mag=K_REP*alpha/(d2+50);
          fx[i]+=dx/dist*mag; fy[i]+=dy/dist*mag*(sameL?0.12:0.25);
          fx[j]-=dx/dist*mag; fy[j]-=dy/dist*mag*(sameL?0.12:0.25);
        }
      }
    }

    // ── Edge springs ────────────────────────────────────────
    for(const [si,ti,etype] of ePairs){
      const dx=px[ti]-px[si], dy=py[ti]-py[si];
      // X: attract toward same column
      fx[si]+=dx*K_EX*alpha;
      fx[ti]-=dx*K_EX*alpha;
      // Y: nudge so source is strictly above target
      const dL=(depth[nodes[ti].id]||0)-(depth[nodes[si].id]||0);
      if(dL>0){
        const idealDy=dL*LAYER_H;
        const err=dy-idealDy;
        fy[si]+=err*K_EY*alpha;
        fy[ti]-=err*K_EY*alpha;
      }
    }

    // ── Dept cohesion ────────────────────────────────────────
    for(let i=0;i<N;i++){
      const cx=deptAvgX[nodes[i].dept];
      if(cx!==undefined) fx[i]+=(cx-px[i])*K_DEPT*alpha;
    }

    // ── Sibling cohesion: pull A/B/C sequences toward each other ─
    // Pairs with same dept+baseNumber attract horizontally
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        if(nodes[i].dept!==nodes[j].dept) continue;
        const pi=nodes[i]._ps||(nodes[i]._ps=parseSfx(nodes[i].code));
        const pj=nodes[j]._ps||(nodes[j]._ps=parseSfx(nodes[j].code));
        if(pi.base===pj.base&&pi.base>0){
          const dx=px[j]-px[i];
          const sibK=0.06*alpha;
          fx[i]+=dx*sibK; fx[j]-=dx*sibK;
        }
      }
    }

    // ── Integrate + clamp Y ──────────────────────────────────
    for(let i=0;i<N;i++){
      vx[i]=(vx[i]+fx[i]*DT)*DAMP;
      vy[i]=(vy[i]+fy[i]*DT)*DAMP;
      px[i]+=vx[i]*DT;
      py[i]+=vy[i]*DT;
      // Soft Y clamp: exponential resistance beyond ±K_YMAX
      const ty=(depth[nodes[i].id]||0)*LAYER_H;
      const dy=py[i]-ty;
      if(Math.abs(dy)>K_YMAX) py[i]=ty+Math.sign(dy)*(K_YMAX+(Math.abs(dy)-K_YMAX)*0.15);
    }

    // Live preview every 25 iters
    if(iter%25===0){
      nodes.forEach((n,i)=>cyInst.getElementById(n.id).position({x:px[i],y:py[i]}));
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════════════════════════════
// PARKING LOT
// ═══════════════════════════════════════════════════════════════════════════════
function _buildParking(parkNodes, allEdges, baseStyle, deptStyles){
  const pw=document.getElementById('pk-wrap');
  if(!parkNodes.length){setPK(false,0);return;}

  const parkSet=new Set(parkNodes.map(n=>n.id));
  const pkEdges=allEdges.filter(e=>parkSet.has(e.source)&&parkSet.has(e.target));

  // Find connected components within parking nodes
  const adj={};
  parkNodes.forEach(n=>{adj[n.id]=[];});
  pkEdges.forEach(e=>{if(adj[e.source]&&adj[e.target]){adj[e.source].push(e.target);adj[e.target].push(e.source);}});
  const seen2=new Set(), pComps=[];
  parkNodes.forEach(n=>{
    if(seen2.has(n.id)) return;
    const comp=[]; const q=[n.id];
    while(q.length){const c=q.pop();if(seen2.has(c))continue;seen2.add(c);comp.push(c);adj[c].forEach(nb=>q.push(nb));}
    pComps.push(comp);
  });
  pComps.sort((a,b)=>b.length-a.length);

  // Layout each comp as a tiny DAG left-to-right
  const CW=110, CH=55, GAP=20;
  const pos={};
  let curX=GAP;
  pComps.forEach(comp=>{
    // Topo depth within comp
    const cd={};comp.forEach(id=>{cd[id]=0;});
    const ca={};comp.forEach(id=>{ca[id]=[];});
    pkEdges.filter(e=>comp.includes(e.source)&&comp.includes(e.target)).forEach(e=>ca[e.source].push(e.target));
    const roots=comp.filter(id=>!pkEdges.some(e=>e.target===id&&comp.includes(e.source)));
    const q2=[...roots]; const s3=new Set(roots);
    while(q2.length){const c=q2.shift();ca[c].forEach(nxt=>{cd[nxt]=Math.max(cd[nxt],cd[c]+1);if(!s3.has(nxt)){s3.add(nxt);q2.push(nxt);}});}
    const maxD=Math.max(0,...comp.map(id=>cd[id]));
    const layers={};
    comp.forEach(id=>{if(!layers[cd[id]])layers[cd[id]]=[];layers[cd[id]].push(id);});
    const maxRow=Math.max(...Object.values(layers).map(r=>r.length));
    const compW=Math.max(CW,maxRow*CW);
    Object.entries(layers).forEach(([L,ids])=>{
      ids.forEach((id,i)=>{pos[id]={x:curX+(i-(ids.length-1)/2)*CW+compW/2, y:parseInt(L)*CH+GAP};});
    });
    curX+=compW+GAP*2;
  });

  const pkH=Math.min(220, Math.max(88, Math.max(...parkNodes.map(n=>pos[n.id]?.y||0))+CH+GAP+28));

  if(cyPK){try{cyPK.destroy();}catch(e){}cyPK=null;}
  cyPK=cytoscape({
    container:document.getElementById('pk-cy'),
    elements:[
      ...parkNodes.map(n=>({data:{
        id:n.id,label:n.code,title:n.title,dept:n.dept,units:n.units,desc:n.desc,
        special:n.special?'yes':'no',external:n.external?'yes':'no',rawPrereqs:n.rawPrereqs,
        layer:0,descCount:0,
      },position:pos[n.id]||{x:0,y:0}})),
      ...pkEdges.map(e=>({data:{id:e.id,source:e.source,target:e.target,etype:e.etype,orPrimary:e.orPrimary?'yes':'no'}})),
    ],
    style:[...baseStyle,...deptStyles],
    layout:{name:'preset'},
    wheelSensitivity:.25,minZoom:.1,maxZoom:4,motionBlur:false,
  });
  cyPK.fit(cyPK.elements(),16);
  _attachEvents(cyPK, false);

  document.getElementById('pk-n').textContent=parkNodes.length+' nodes';
  setPK(true, pkH);
}

function setPK(open,h){
  const pw=document.getElementById('pk-wrap');
  const tog=document.getElementById('pk-tog');
  pw.style.height=(open?h:0)+'px';
  if(tog) tog.textContent=open?'▼':'▲';
}
function togglePK(){
  const pw=document.getElementById('pk-wrap');
  const cur=parseInt(pw.style.height)||0;
  if(cur>28){ pw.style.height='28px'; document.getElementById('pk-tog').textContent='▲'; }
  else {
    const pkH=cyPK?Math.min(220,88):0;
    pw.style.height=pkH+'px'; document.getElementById('pk-tog').textContent='▼';
    if(cyPK) setTimeout(()=>cyPK.resize(),260);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════════════════════
function showTip(e){
  const d=e.target.data();
  document.getElementById('tc').textContent=d.label;
  document.getElementById('tt').textContent=d.title;
  document.getElementById('tdesc').textContent=(d.desc||'').length>142?d.desc.slice(0,142)+'…':d.desc;
  document.getElementById('tu').textContent=d.units+' unit'+(d.units!==1?'s':'');
  document.getElementById('td').textContent=d.layer!==undefined
    ?'layer '+(d.layer+1)+(d.descCount?' · '+d.descCount+' dep.':''):'isolated';
  document.getElementById('tdt').textContent=d.external==='yes'?'external':'dept: '+d.dept;
  const rp=d.rawPrereqs;
  const lines=[];
  if(rp){
    (rp.required||[]).forEach((g,i)=>lines.push(`<strong>Req ${i+1}:</strong> ${g.join(' <em>or</em> ')}`));
    (rp.concurrent||[]).forEach((g,i)=>lines.push(`<strong>Conc ${i+1}:</strong> ${g.join(' <em>or</em> ')}`));
  }
  document.getElementById('tpreq').innerHTML=lines.join('<br>')||'<em>no prerequisites</em>';
  document.getElementById('tip').style.display='block';
}

// ═══════════════════════════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════════════════════════
function _attachEvents(cyInst, isMain){
  cyInst.on('mouseover','node',e=>showTip(e));
  cyInst.on('mousemove','node',e=>{
    document.getElementById('tip').style.left=(e.originalEvent.clientX+15)+'px';
    document.getElementById('tip').style.top=(e.originalEvent.clientY-8)+'px';
  });
  cyInst.on('mouseout','node',()=>{document.getElementById('tip').style.display='none';});
  if(isMain){
    cyInst.on('tap','node',e=>{
      document.getElementById('tip').style.display='none';
      cyInst.elements().removeClass('hi fa');
      const n=e.target;
      const chain=n.union(n.predecessors()).union(n.successors());
      cyInst.elements().not(chain).addClass('fa');
      chain.addClass('hi');
    });
    cyInst.on('tap',e=>{
      if(e.target===cyInst){
        cyInst.elements().removeClass('hi fa');
        const d=document.getElementById('dsel').value,q=document.getElementById('search').value.trim();
        if(d||q)doFilter();
      }
    });
  }
  cyInst.on('dblclick','node',e=>{const url=e.target.data('url');if(url&&url!=='#')window.open(url,'_blank');});
}

// ═══════════════════════════════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════════════════════════════
function toggleFlag(f){
  if(f==='spec'){
    hideSpecial=!hideSpecial;
    const b=document.getElementById('bspec');
    b.textContent=hideSpecial?'Hide Special':'Show Special';
    b.classList.toggle('on',hideSpecial);
  } else {
    hideExternal=!hideExternal;
    const b=document.getElementById('bext');
    b.textContent=hideExternal?'Show External':'Hide External';
    b.classList.toggle('on',hideExternal);
  }
  if(rawData){showLoad('REBUILDING…');requestAnimationFrame(()=>requestAnimationFrame(()=>{try{_build();}catch(e){showErr(e.message);}}));}
}
function doFilter(){
  if(!cy)return;
  cy.elements().removeClass('hi fa');
  const dept=document.getElementById('dsel').value;
  const q=document.getElementById('search').value.toLowerCase().trim();
  if(!dept&&!q)return;
  let m=cy.nodes();
  if(dept)m=m.filter(`[dept="${dept}"]`);
  if(q)m=m.filter(n=>n.data('label').toLowerCase().includes(q)||n.data('title').toLowerCase().includes(q));
  if(!m.length)return;
  const keep=m.closedNeighborhood();
  cy.elements().not(keep).addClass('fa');
  keep.addClass('hi');
}
function doSearch(){doFilter();}
function resetAll(){
  if(!cy)return;
  cy.elements().removeClass('hi fa');
  document.getElementById('dsel').value='';
  document.getElementById('search').value='';
}
