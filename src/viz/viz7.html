<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Prerequisite Graph</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07090f; --surface:#0c0f18; --s2:#10141f;
    --border:#1a2035; --accent:#38bdf8; --a2:#fb923c; --a3:#a78bfa;
    --text:#cdd5e0; --muted:#3d4a60;
    --glow:0 0 18px rgba(56,189,248,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(56,189,248,.028) 0%, transparent 70%)}

  header{position:relative;z-index:10;padding:7px 15px;border-bottom:1px solid var(--border);
    background:rgba(7,9,15,.97);backdrop-filter:blur(16px);
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:46px}
  .logo{font-size:.9rem;font-weight:800;letter-spacing:-.02em;color:var(--accent);text-shadow:var(--glow);white-space:nowrap}
  .logo span{color:var(--muted);font-weight:400}
  .sep{width:1px;height:20px;background:var(--border);flex-shrink:0}
  .ctrl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex:1}

  .btn{font-family:'JetBrains Mono',monospace;font-size:.61rem;font-weight:600;padding:4px 9px;
    border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;
    transition:all .15s;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
  .btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--glow)}
  .btn.on{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,.07)}
  .btn.w{border-color:var(--a2);color:var(--a2)}
  .btn.w.on{background:rgba(251,146,60,.07)}

  select,.srch{font-family:'JetBrains Mono',monospace;font-size:.61rem;padding:4px 7px;
    background:var(--surface);border:1px solid var(--border);color:var(--text);outline:none;transition:border-color .15s}
  select:focus,.srch:focus{border-color:var(--accent)}
  .srch{width:130px}
  .srch::placeholder{color:var(--muted)}

  .chips{display:flex;gap:4px;margin-left:auto}
  .chip{font-family:'JetBrains Mono',monospace;font-size:.57rem;padding:2px 6px;border:1px solid var(--border);color:var(--muted);background:var(--surface)}
  .chip strong{color:var(--accent)}

  #wrap{flex:1;position:relative;z-index:1}
  #cy{width:100%;height:100%}

  #drop{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:14px;background:var(--bg)}
  .dbox{border:2px dashed var(--border);padding:44px 64px;text-align:center;transition:all .3s;cursor:pointer}
  .dbox:hover,.dbox.over{border-color:var(--accent);box-shadow:var(--glow),inset 0 0 32px rgba(56,189,248,.04)}
  .dico{font-size:2rem;margin-bottom:10px;opacity:.3}
  .dtitle{font-size:1.15rem;font-weight:700;margin-bottom:4px}
  .dsub{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);margin-bottom:14px}
  #finput{display:none}
  .ordiv{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.1em}

  #loading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(7,9,15,.92);z-index:50;flex-direction:column;gap:10px}
  .lrow{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--accent);letter-spacing:.1em;display:flex;align-items:center;gap:8px}
  .spin{width:15px;height:15px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  #err{display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:100;
    background:#2a0808;border:1px solid #ef4444;color:#fca5a5;
    font-family:'JetBrains Mono',monospace;font-size:.66rem;padding:7px 14px;max-width:420px;text-align:center}

  #tip{position:fixed;display:none;z-index:200;background:var(--s2);border:1px solid var(--accent);
    padding:11px 13px;max-width:285px;box-shadow:var(--glow);pointer-events:none}
  .tc{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--accent);margin-bottom:2px}
  .tt{font-size:.82rem;font-weight:700;margin-bottom:5px;line-height:1.25}
  .td{font-size:.66rem;color:var(--muted);line-height:1.4;margin-bottom:6px}
  .tm{display:flex;gap:4px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:.59rem}
  .tg{padding:2px 5px;border:1px solid var(--border);color:var(--muted)}
  .tg.u{border-color:rgba(167,139,250,.45);color:#c4b5fd}
  .tg.r{border-color:rgba(56,189,248,.3);color:var(--accent)}
  .tpreq{margin-top:5px;font-size:.61rem;color:var(--muted);font-family:'JetBrains Mono',monospace;border-top:1px solid var(--border);padding-top:5px;line-height:1.6}
  .tpreq strong{color:var(--text)}

  #legend{position:fixed;bottom:12px;left:12px;z-index:50;background:rgba(12,15,24,.97);
    border:1px solid var(--border);padding:10px 12px;display:none;max-height:54vh;overflow-y:auto;min-width:145px}
  .ltitle{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
  .li{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:.67rem;color:var(--muted)}
  .ld{width:9px;height:9px;flex-shrink:0}

  /* Ring label overlay drawn on canvas SVG */
  #ring-svg{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:visible}
</style>
</head>
<body>
<header>
  <div class="logo">COURSE<span>GRAPH</span></div>
  <div class="sep"></div>
  <div class="ctrl" id="ctrl" style="display:none">
    <input class="srch" id="search" placeholder="Search…" oninput="doSearch()">
    <select id="dsel" onchange="doFilter()"><option value="">All Depts</option></select>
    <div class="sep"></div>
    <button class="btn w on" id="bspec"  onclick="toggleFlag('special')">Hide Special</button>
    <button class="btn"      id="bext"   onclick="toggleFlag('external')">Hide External</button>
    <div class="sep"></div>
    <button class="btn on"   id="bradial" onclick="setLayout('radial')">Radial</button>
    <button class="btn"      id="btier"   onclick="setLayout('tier')">Tier</button>
    <button class="btn"      id="bforce"  onclick="setLayout('force')">Force</button>
    <div class="sep"></div>
    <label style="font-family:'JetBrains Mono',monospace;font-size:.59rem;color:var(--muted);white-space:nowrap">
      SCALE<input type="range" id="rscale" min="60" max="260" value="130" style="width:52px;vertical-align:middle;margin-left:3px" oninput="onScale(this.value)">
    </label>
    <div class="sep"></div>
    <button class="btn on" onclick="cy&&cy.animate({fit:{padding:40},duration:300})">Fit</button>
    <button class="btn" onclick="resetAll()">Reset</button>
    <button class="btn" onclick="reloadUI()">Load New</button>
  </div>
  <div class="chips" id="chips" style="display:none">
    <div class="chip"><strong id="sn">0</strong> courses</div>
    <div class="chip"><strong id="se">0</strong> edges</div>
    <div class="chip"><strong id="sr">0</strong> rings</div>
  </div>
</header>

<div id="wrap">
  <div id="drop">
    <div class="dbox" id="dbox" onclick="document.getElementById('finput').click()"
         ondragover="event.preventDefault();this.classList.add('over')"
         ondragleave="this.classList.remove('over')"
         ondrop="onDrop(event)">
      <div class="dico">◎</div>
      <div class="dtitle">Drop your course JSON here</div>
      <div class="dsub">prereqs.required = AND-of-OR groups</div>
      <button class="btn on" onclick="event.stopPropagation();document.getElementById('finput').click()">Browse File</button>
    </div>
    <div class="ordiv">— OR —</div>
    <button class="btn" onclick="loadDemo()">Load Demo Graph</button>
    <input type="file" id="finput" accept=".json" onchange="onFile(this)">
  </div>
  <div id="loading"><div class="lrow"><div class="spin"></div><span id="lmsg">BUILDING…</span></div></div>
  <div id="err"></div>
  <svg id="ring-svg"></svg>
  <div id="cy"></div>
</div>

<div id="tip">
  <div class="tc" id="tc"></div>
  <div class="tt" id="tt2"></div>
  <div class="td" id="td"></div>
  <div class="tm">
    <span class="tg u" id="tu"></span>
    <span class="tg r" id="tr2"></span>
    <span class="tg"   id="tp3"></span>
  </div>
  <div class="tpreq" id="tpreq"></div>
</div>

<div id="legend">
  <div class="ltitle">Departments</div>
  <div id="ldepts"></div>
  <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
    <div class="li"><div style="width:20px;height:2px;background:rgba(56,189,248,.7)"></div><span>Required (primary)</span></div>
    <div class="li"><div style="width:20px;height:1px;border-top:1px dotted rgba(148,163,184,.3)"></div><span>Required (OR alt)</span></div>
    <div class="li"><div style="width:20px;height:0;border-top:2px dashed rgba(251,146,60,.7)"></div><span>Concurrent</span></div>
    <div class="li" style="margin-top:4px"><div class="ld" style="border:1.5px dashed rgba(251,191,36,.55)"></div><span>Special topics</span></div>
    <div class="li"><div class="ld" style="border:1.5px dashed rgba(100,116,139,.4)"></div><span>External dept</span></div>
  </div>
</div>

<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script>

// STATE
// ═══════════════════════════════════════════════════════════════

let hideSpecial = true, hideExternal = false;

// ═══════════════════════════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════════════════════════
const PAL=['#38bdf8','#fb923c','#a78bfa','#34d399','#fbbf24','#f472b6',
           '#60a5fa','#a3e635','#f97316','#22d3ee','#818cf8','#f87171',
           '#2dd4bf','#e879f9','#4ade80','#facc15','#fb7185','#67e8f9'];
let dmap={};
function dc(d){if(!dmap[d])dmap[d]=PAL[Object.keys(dmap).length%PAL.length];return dmap[d];}

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function courseNum(code){const m=(code||'').match(/(\d+)/);return m?parseInt(m[1]):500;}
function isSpecial(code){const n=courseNum(code);return(n>=90&&n<=99)||(n>=190&&n<=199);}
function phantomId(c){'use strict';return '__ext__'+c;}
function isPhantom(id){return typeof id==='string'&&id.startsWith('__ext__');}

// ─── I/O ──────────────────────────────────────────────────────
function onDrop(e){e.preventDefault();document.getElementById('dbox').classList.remove('over');const f=e.dataTransfer.files[0];if(f)readFile(f);}
function onFile(i){if(i.files[0])readFile(i.files[0]);}
function readFile(f){const r=new FileReader();r.onload=e=>{try{buildGraph(JSON.parse(e.target.result));}catch(ex){showErr('Invalid JSON: '+ex.message);}};r.readAsText(f);}
function reloadUI(){document.getElementById('drop').style.display='flex';['ctrl','chips','legend'].forEach(id=>document.getElementById(id).style.display='none');clearRingSVG();}
function showLoad(m){document.getElementById('lmsg').textContent=m||'BUILDING…';document.getElementById('loading').style.display='flex';}
function hideLoad(){document.getElementById('loading').style.display='none';}
function showErr(m){const b=document.getElementById('err');b.textContent='⚠ '+m;b.style.display='block';setTimeout(()=>b.style.display='none',6000);hideLoad();}

// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// BUILD GRAPH
// ═══════════════════════════════════════════════════════════════
function buildGraph(data){
  rawData=data; dmap={};
  document.getElementById('drop').style.display='none';
  showLoad('ANALYSING GRAPH…');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    try{_build();}catch(ex){showErr('Build failed: '+ex.message);console.error(ex);}
  }));
}

function _build(){
  let courses=rawData.courses||[];
  if(!courses.length){showErr('No courses found.');return;}
  if(hideSpecial) courses=courses.filter(c=>!isSpecial(c.code||c.id));

  const knownIds=new Set(courses.map(c=>c.id));

  // ── Phantom nodes for external prereqs ──
  const phantoms={};
  courses.forEach(c=>{
    [...(c.prereqs?.required||[]),...(c.prereqs?.concurrent||[])].flat().forEach(pid=>{
      if(!knownIds.has(pid)&&!phantoms[pid])
        phantoms[pid]={id:phantomId(pid),code:pid,dept:pid.split(' ')[0],title:'External prereq',external:true};
    });
  });

  const allNodes=[
    ...courses.map(c=>({id:c.id,code:c.code||c.id,dept:c.department||'?',
      title:c.title||'',units:c.units||0,desc:c.description||'',
      special:isSpecial(c.code||c.id),external:false,rawPrereqs:c.prereqs})),
    ...(!hideExternal?Object.values(phantoms).map(p=>({id:p.id,code:p.code,dept:p.dept,
      title:'External prereq',units:0,desc:'Referenced but not in this catalog.',
      special:false,external:true,rawPrereqs:{required:[],concurrent:[]}})):[]),
  ];
  const nodeSet=new Set(allNodes.map(n=>n.id));
  function rid(pid){if(nodeSet.has(pid))return pid;const ph=phantomId(pid);return nodeSet.has(ph)?ph:null;}

  // ── Edges ──
  const edges=[],edgeSet=new Set();
  courses.forEach(c=>{
    (c.prereqs?.required||[]).forEach((g,gi)=>g.forEach((pid,pi)=>{
      const src=rid(pid);if(!src)return;
      const eid=`req:${src}=>${c.id}:${gi}`;
      if(edgeSet.has(eid))return;edgeSet.add(eid);
      edges.push({id:eid,source:src,target:c.id,etype:'required',orPrimary:pi===0,orSize:g.length});
    }));
    (c.prereqs?.concurrent||[]).forEach((g,gi)=>g.forEach((pid,pi)=>{
      const src=rid(pid);if(!src)return;
      const eid=`conc:${src}=>${c.id}:${gi}`;
      if(edgeSet.has(eid))return;edgeSet.add(eid);
      edges.push({id:eid,source:src,target:c.id,etype:'concurrent',orPrimary:pi===0,orSize:g.length});
    }));
  });

  // ── Graph analysis ──────────────────────────────────────────
  // Build adjacency (required edges only for structure)
  const children={},parents={};
  allNodes.forEach(n=>{children[n.id]=[];parents[n.id]=[];});
  edges.filter(e=>e.etype==='required').forEach(e=>{
    if(children[e.source]!==undefined&&parents[e.target]!==undefined){
      children[e.source].push(e.target);
      parents[e.target].push(e.source);
    }
  });

  // BFS descendant count = "centrality" (how much depends on this node)
  function descCount(start){
    const vis=new Set();const q=[start];
    while(q.length){const cur=q.shift();(children[cur]||[]).forEach(ch=>{if(!vis.has(ch)){vis.add(ch);q.push(ch);}});}
    return vis.size;
  }
  // Longest path FROM a node (depth into the tree = how specialized it is)
  function longestPath(start){
    const memo={};
    function dp(n){
      if(memo[n]!==undefined)return memo[n];
      const ch=children[n]||[];
      if(!ch.length){memo[n]=0;return 0;}
      memo[n]=1+Math.max(...ch.map(dp));
      return memo[n];
    }
    return dp(start);
  }
  // Longest path TO a node (prereq chain depth = how deep in the graph)
  function chainDepth(start){
    const memo={};
    function dp(n){
      if(memo[n]!==undefined)return memo[n];
      const par=parents[n]||[];
      if(!par.length){memo[n]=0;return 0;}
      memo[n]=1+Math.max(...par.map(dp));
      return memo[n];
    }
    return dp(start);
  }

  const descC={},chainD={};
  allNodes.forEach(n=>{descC[n.id]=descCount(n.id);chainD[n.id]=chainDepth(n.id);});

  // ── Connected components ──
  const undirAdj={};
  allNodes.forEach(n=>{undirAdj[n.id]=new Set();});
  edges.filter(e=>e.etype==='required').forEach(e=>{
    if(undirAdj[e.source]&&undirAdj[e.target]){undirAdj[e.source].add(e.target);undirAdj[e.target].add(e.source);}
  });
  const compOf={};
  const components=[];
  const seen=new Set();
  allNodes.forEach(n=>{
    if(seen.has(n.id))return;
    const comp=[];const q=[n.id];
    while(q.length){const cur=q.shift();if(seen.has(cur))continue;seen.add(cur);comp.push(cur);(undirAdj[cur]||new Set()).forEach(nb=>q.push(nb));}
    components.push(comp);
    comp.forEach(id=>compOf[id]=components.length-1);
  });
  // Main component = largest
  const mainCompIdx=components.reduce((mi,c,i)=>c.length>components[mi].length?i:mi,0);
  const mainCompSet=new Set(components[mainCompIdx]);
  // Small components: isolated chains etc.
  const smallComps=components.filter((_,i)=>i!==mainCompIdx);

  // ── Radial ring assignment ──
  // Ring = chainDepth (distance from any root in the prereq graph)
  // Nodes not in main component get placed in outer satellite clusters
  const maxRingMain=Math.max(0,...components[mainCompIdx].map(id=>chainD[id]));
  const SATELLITE_RING=maxRingMain+2;  // isolated chains go outside main rings

  const ringOf={};
  allNodes.forEach(n=>{
    if(!mainCompSet.has(n.id)) ringOf[n.id]=SATELLITE_RING;
    else ringOf[n.id]=chainD[n.id];
  });

  // ── Assign angular positions ──
  // Main component: group by dept within each ring
  // Satellites: place in outer arcs, grouped by their component
  const rings={};
  allNodes.forEach(n=>{const r=ringOf[n.id];(rings[r]=rings[r]||[]).push(n.id);});

  const depts=[...new Set(allNodes.map(n=>n.dept))].sort();
  depts.forEach(d=>dc(d));

  // For each ring, sort nodes: dept order, then course number within dept
  // Dept order: sort by average chainDepth of all courses in dept (so more foundational depts appear at same angular sector)
  const deptSector={};
  const coreDepts=depts.filter(d=>allNodes.some(n=>n.dept===d&&mainCompSet.has(n.id)));
  // Sort depts by avg desc count descending (core depts with many descendants get central angles)
  coreDepts.sort((a,b)=>{
    const avgA=allNodes.filter(n=>n.dept===a).reduce((s,n)=>s+descC[n.id],0)/Math.max(1,allNodes.filter(n=>n.dept===a).length);
    const avgB=allNodes.filter(n=>n.dept===b).reduce((s,n)=>s+descC[n.id],0)/Math.max(1,allNodes.filter(n=>n.dept===b).length);
    return avgB-avgA;
  });
  // Assign angular sectors: spread depts evenly across [0, 2π) for main component
  // Use golden angle to separate satellite components
  coreDepts.forEach((d,i)=>{deptSector[d]=i/coreDepts.length;});
  depts.filter(d=>!coreDepts.includes(d)).forEach((d,i)=>{deptSector[d]=0.5+i*0.07;});

  // ── Compute (r, θ) for each node ──
  const RING_GAP=rscale;  // pixels between rings
  const INNER_R=0;        // ring 0 = center

  const nodeAngles={};  // for edge-crossing minimization pass
  const nodeRings={};

  // For each ring, spread nodes within dept sectors
  Object.keys(rings).map(Number).sort((a,b)=>a-b).forEach(ring=>{
    const ids=rings[ring];
    nodeRings[ring]=ids;
    const r=ring===0?0:(ring+1)*RING_GAP;

    if(ring===0){
      // Center: single node or tiny cluster, place at origin with tiny offset
      ids.forEach((id,i)=>{
        const angle=i*(2*Math.PI/Math.max(ids.length,1));
        nodeAngles[id]={r,angle};
      });
      return;
    }

    if(ring===SATELLITE_RING){
      // Satellite clusters: place in outer ring, grouped by component
      // Each small component gets its own angular arc, spaced well apart
      const compGroups={};
      ids.forEach(id=>{const ci=compOf[id];(compGroups[ci]=compGroups[ci]||[]).push(id);});
      const compList=Object.values(compGroups);
      const arcPerComp=2*Math.PI/Math.max(compList.length,1);
      compList.forEach((comp,ci)=>{
        const baseAngle=ci*arcPerComp+Math.PI/6;
        comp.sort((a,b)=>chainD[a]-chainD[b]||courseNum(a)-courseNum(b));
        comp.forEach((id,j)=>{
          const angle=baseAngle+j*(arcPerComp*0.7/Math.max(comp.length,1));
          nodeAngles[id]={r:r+ci*30,angle};
        });
      });
      return;
    }

    // Main ring: group by dept sector, spread within sector
    const deptGroups={};
    ids.forEach(id=>{
      const d=allNodes.find(n=>n.id===id)?.dept||'?';
      (deptGroups[d]=deptGroups[d]||[]).push(id);
    });

    // Sort each dept group by course number
    Object.values(deptGroups).forEach(g=>g.sort((a,b)=>courseNum(a.replace('__ext__',''))-courseNum(b.replace('__ext__',''))));

    // Total nodes in ring → spacing
    const totalInRing=ids.length;
    const circumference=2*Math.PI*r;
    const nodeSpacing=Math.max(0.18,Math.min(0.9,100/Math.max(circumference,1)));

    // Lay out dept groups sequentially around the circle, weighted by group size
    const deptOrder=[...coreDepts.filter(d=>deptGroups[d]),...Object.keys(deptGroups).filter(d=>!coreDepts.includes(d))];
    let cursor=0;
    const totalNodes=ids.length;
    deptOrder.forEach(d=>{
      const group=deptGroups[d]||[];
      // Start angle for this group: based on dept's sector and cursor
      const sectorStart=deptSector[d]??cursor/totalNodes;
      // Blend dept sector with position in ring
      const groupAngle=(sectorStart*2*Math.PI)+cursor*0.05;
      group.forEach((id,j)=>{
        const angle=groupAngle+j*(2*Math.PI*nodeSpacing/Math.max(totalInRing,1));
        nodeAngles[id]={r,angle};
      });
      cursor+=group.length;
    });
  });

  // ── Convert polar to cartesian ──
  function polarToXY(r,angle){return{x:r*Math.cos(angle-Math.PI/2),y:r*Math.sin(angle-Math.PI/2)};}

  const positions={};
  allNodes.forEach(n=>{
    const pa=nodeAngles[n.id];
    if(pa) positions[n.id]=polarToXY(pa.r,pa.angle);
    else positions[n.id]={x:0,y:0};
  });

  // ── Angular relaxation pass: minimize edge crossings ──
  // For each ring, nudge node angles to align better with their parents' angles
  // This runs purely in angle space, keeping radii fixed
  for(let pass=0;pass<80;pass++){
    const alpha=1-pass/80;
    Object.keys(rings).map(Number).sort((a,b)=>a-b).forEach(ring=>{
      if(ring===0||ring===SATELLITE_RING) return;
      (rings[ring]||[]).forEach(id=>{
        const pa=nodeAngles[id]; if(!pa) return;
        // Attract angle toward avg parent angle (mapped to same half-circle)
        const pars=parents[id]||[];
        if(!pars.length) return;
        let sumAngle=0,count=0;
        pars.forEach(pid=>{
          const pp=nodeAngles[pid]; if(!pp) return;
          // Unwrap angle to be closest to current
          let da=pp.angle-pa.angle;
          while(da>Math.PI) da-=2*Math.PI;
          while(da<-Math.PI) da+=2*Math.PI;
          sumAngle+=pa.angle+da; count++;
        });
        if(!count) return;
        const targetAngle=sumAngle/count;
        pa.angle=pa.angle+(targetAngle-pa.angle)*0.12*alpha;
      });
    });
  }

  // Recompute cartesian after relaxation
  allNodes.forEach(n=>{
    const pa=nodeAngles[n.id];
    if(pa) positions[n.id]=polarToXY(pa.r,pa.angle);
  });

  // ── Stats ──
  const numRings=Math.max(...Object.values(ringOf))+1;
  document.getElementById('sn').textContent=courses.length+(hideExternal?'':'+'+Object.keys(phantoms).length);
  document.getElementById('se').textContent=edges.length;
  document.getElementById('sr').textContent=numRings;

  // ── Dept filter ──
  const sel=document.getElementById('dsel');
  const prev=sel.value;
  sel.innerHTML='<option value="">All Depts</option>';
  depts.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o);});
  sel.value=depts.includes(prev)?prev:'';

  // ── Legend ──
  document.getElementById('ldepts').innerHTML=depts.map(d=>
    `<div class="li"><div class="ld" style="background:${dc(d)}"></div><span>${d}</span></div>`).join('');

  // ── Destroy old cy ──
  if(cy){try{cy.destroy();}catch(e){}cy=null;}

  const deptStyles=depts.map(d=>({selector:`node[dept="${d}"]`,style:{'background-color':dc(d)}}));

  cy=cytoscape({
    container:document.getElementById('cy'),
    elements:[
      ...allNodes.map(n=>({data:{
        id:n.id,label:n.code,title:n.title,dept:n.dept,
        units:n.units,desc:n.desc,
        ring:ringOf[n.id]??0,
        descCount:descC[n.id]??0,
        special:n.special?'yes':'no',
        external:n.external?'yes':'no',
        rawPrereqs:n.rawPrereqs,
      },position:positions[n.id]||{x:0,y:0}})),
      ...edges.map(e=>({data:{
        id:e.id,source:e.source,target:e.target,
        etype:e.etype,orPrimary:e.orPrimary?'yes':'no',orSize:e.orSize,
      }})),
    ],
    style:[
      {selector:'node',style:{
        'label':'data(label)',
        'font-family':'JetBrains Mono, monospace',
        'font-size':'8px','font-weight':'700','color':'#07090f',
        'text-valign':'center','text-halign':'center',
        'width':'label','height':'label','padding':'5px 8px',
        'shape':'round-rectangle','border-width':0,'background-color':'#334155',
      }},
      ...deptStyles,
      // Ring 0 nodes (core) — slightly larger
      {selector:'node[ring=0]',style:{'font-size':'9px','padding':'7px 10px','border-width':1,'border-color':'rgba(255,255,255,.15)'}},
      // External ghost
      {selector:'node[external="yes"]',style:{
        'background-color':'transparent','border-width':1.5,'border-style':'dashed',
        'border-color':'rgba(100,116,139,.4)','color':'rgba(100,116,139,.6)','font-size':'7.5px',
      }},
      // Special topics — amber dashed
      {selector:'node[special="yes"]',style:{
        'border-width':1.5,'border-style':'dashed','border-color':'rgba(251,191,36,.55)',
      }},
      {selector:'node.hi',style:{'border-width':2.5,'border-color':'#fff','border-style':'solid','z-index':10,'opacity':1}},
      {selector:'node.fa',style:{'opacity':.08}},
      // ── Edges ──
      {selector:'edge',style:{
        'width':1.1,'curve-style':'bezier',
        'target-arrow-shape':'triangle','arrow-scale':.68,
        'line-color':'rgba(56,189,248,.45)','target-arrow-color':'rgba(56,189,248,.45)',
      }},
      {selector:'edge[etype="required"][orPrimary="yes"]',style:{
        'line-color':'rgba(56,189,248,.68)','target-arrow-color':'rgba(56,189,248,.68)','width':1.5,
      }},
      {selector:'edge[etype="required"][orPrimary="no"]',style:{
        'line-style':'dotted','line-color':'rgba(148,163,184,.22)','target-arrow-color':'rgba(148,163,184,.22)','width':.85,
      }},
      {selector:'edge[etype="concurrent"][orPrimary="yes"]',style:{
        'line-style':'dashed','line-dash-pattern':[4,3],
        'line-color':'rgba(251,146,60,.65)','target-arrow-color':'rgba(251,146,60,.65)',
      }},
      {selector:'edge[etype="concurrent"][orPrimary="no"]',style:{
        'line-style':'dotted','line-color':'rgba(251,146,60,.22)','target-arrow-color':'rgba(251,146,60,.22)','width':.85,
      }},
      {selector:'edge.hi',style:{'width':2,'z-index':5,'opacity':1}},
      {selector:'edge[etype="required"].hi',style:{'line-color':'rgba(56,189,248,.95)','target-arrow-color':'rgba(56,189,248,.95)','line-style':'solid'}},
      {selector:'edge[etype="concurrent"].hi',style:{'line-color':'rgba(251,146,60,.95)','target-arrow-color':'rgba(251,146,60,.95)'}},
      {selector:'edge.fa',style:{'opacity':.03}},
    ],
    layout:{name:'preset'},
    wheelSensitivity:.25,minZoom:.025,maxZoom:6,
    textureOnViewport:allNodes.length>200,
    hideEdgesOnViewport:allNodes.length>300,
    motionBlur:false,
  });

  // Draw ring guide circles in SVG overlay
  drawRingGuides(Object.keys(rings).map(Number).filter(r=>r!==SATELLITE_RING&&r>0), RING_GAP, numRings, SATELLITE_RING);

  _attachEvents();
  hideLoad();
  document.getElementById('ctrl').style.display='flex';
  document.getElementById('chips').style.display='flex';
  document.getElementById('legend').style.display='block';
  if(sel.value) doFilter();
}

// ═══════════════════════════════════════════════════════════════
// RING GUIDE CIRCLES (subtle SVG overlay that pans/zooms with cy)
// ═══════════════════════════════════════════════════════════════
function clearRingSVG(){document.getElementById('ring-svg').innerHTML='';}

function drawRingGuides(rings, ringGap, numRings, satRing){
  clearRingSVG();
  // We draw circles in cytoscape coordinates using a cytoscape layer
  // Since SVG overlays don't pan with cy, we use a cy custom bg trick:
  // add invisible reference nodes at cardinal points of each ring, then
  // draw nothing — instead draw circles using cy's own canvas via an extension.
  // Simpler: just skip the overlay. The ring guides would need pan sync which is complex.
  // Instead, add subtle node glows on ring 0 via the style above.
}

// ═══════════════════════════════════════════════════════════════
// ALTERNATIVE LAYOUTS
// ═══════════════════════════════════════════════════════════════
function setLayout(name){
  curLayout=name;
  ['radial','tier','force'].forEach(l=>{const b=document.getElementById('b'+l);if(b)b.classList.toggle('on',l===name);});
  if(!cy) return;
  if(name==='radial'){
    showLoad('REBUILDING…');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{try{_build();}catch(e){showErr(e.message);}}));
    return;
  }
  showLoad('COMPUTING…');
  setTimeout(()=>{
    try{
      if(name==='tier'){
        // Strict tier: use chainDepth as Y
        const VGAP=160,HGAP=Math.max(90,rscale);
        const tiers={};
        cy.nodes().forEach(n=>{const r=n.data('ring')??0;(tiers[r]=tiers[r]||[]).push(n);});
        const pos={};
        Object.keys(tiers).map(Number).sort((a,b)=>a-b).forEach(r=>{
          const row=tiers[r].sort((a,b)=>a.data('dept').localeCompare(b.data('dept'))||courseNum(a.data('label'))-courseNum(b.data('label')));
          const NW=90,total=row.length,totalW=total*(NW+HGAP)-HGAP;
          row.forEach((n,i)=>pos[n.id()]={x:-totalW/2+i*(NW+HGAP)+NW/2,y:r*VGAP});
        });
        cy.nodes().forEach(n=>n.animate({position:pos[n.id()]||{x:0,y:0},duration:320,easing:'ease-out-cubic'}));
        setTimeout(()=>cy.fit(cy.elements(),40),360);
      } else if(name==='force'){
        cy.layout({name:'cose',animate:false,padding:50,idealEdgeLength:85,nodeRepulsion:6500,gravity:.28,numIter:500}).run();
        cy.fit(cy.elements(),40);
      }
      hideLoad();
    }catch(e){showErr('Layout error: '+e.message);hideLoad();}
  },60);
}

function onScale(v){
  rscale=parseInt(v);
  if(curLayout==='radial'&&rawData){
    showLoad('RESCALING…');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{try{_build();}catch(e){showErr(e.message);}}));
  }
}

// ═══════════════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════════════
function toggleFlag(flag){
  if(flag==='special'){
    hideSpecial=!hideSpecial;
    const b=document.getElementById('bspec');
    b.textContent=hideSpecial?'Hide Special':'Show Special';
    b.classList.toggle('on',hideSpecial);
  } else {
    hideExternal=!hideExternal;
    const b=document.getElementById('bext');
    b.textContent=hideExternal?'Show External':'Hide External';
    b.classList.toggle('on',hideExternal);
  }
  if(rawData){showLoad('REBUILDING…');requestAnimationFrame(()=>requestAnimationFrame(()=>{try{_build();}catch(e){showErr(e.message);}}));}
}

function doFilter(){
  if(!cy) return;
  cy.elements().removeClass('hi fa');
  const dept=document.getElementById('dsel').value;
  const q=document.getElementById('search').value.toLowerCase().trim();
  if(!dept&&!q) return;
  let match=cy.nodes();
  if(dept) match=match.filter(`[dept="${dept}"]`);
  if(q)    match=match.filter(n=>n.data('label').toLowerCase().includes(q)||n.data('title').toLowerCase().includes(q));
  if(!match.length) return;
  const keep=match.closedNeighborhood();
  cy.elements().not(keep).addClass('fa');
  keep.addClass('hi');
}
function doSearch(){doFilter();}
function resetAll(){
  if(!cy) return;
  cy.elements().removeClass('hi fa');
  document.getElementById('dsel').value='';
  document.getElementById('search').value='';
}

// ═══════════════════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════════════════
function prereqHTML(rp){
  if(!rp) return '';
  const lines=[];
  (rp.required||[]).forEach((g,i)=>lines.push(`<strong>Req ${i+1}:</strong> ${g.join(' <em>or</em> ')}`));
  (rp.concurrent||[]).forEach((g,i)=>lines.push(`<strong>Conc ${i+1}:</strong> ${g.join(' <em>or</em> ')}`));
  return lines.join('<br>');
}

// ═══════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════
function _attachEvents(){
  const tip=document.getElementById('tip');
  cy.on('mouseover','node',e=>{
    const d=e.target.data();
    document.getElementById('tc').textContent=d.label;
    document.getElementById('tt2').textContent=d.title;
    document.getElementById('td').textContent=(d.desc||'').length>148?d.desc.slice(0,148)+'…':d.desc;
    document.getElementById('tu').textContent=d.units+' unit'+(d.units!==1?'s':'');
    document.getElementById('tr2').textContent='ring '+(d.ring+1)+' · '+d.descCount+' dependents';
    document.getElementById('tp3').textContent=d.external==='yes'?'external':'dept: '+d.dept;
    document.getElementById('tpreq').innerHTML=prereqHTML(d.rawPrereqs);
    tip.style.display='block';
  });
  cy.on('mousemove','node',e=>{tip.style.left=(e.originalEvent.clientX+15)+'px';tip.style.top=(e.originalEvent.clientY-8)+'px';});
  cy.on('mouseout','node',()=>{tip.style.display='none';});
  cy.on('tap','node',e=>{
    tip.style.display='none';
    cy.elements().removeClass('hi fa');
    const n=e.target;
    const chain=n.union(n.predecessors()).union(n.successors());
    cy.elements().not(chain).addClass('fa');
    chain.addClass('hi');
  });
  cy.on('tap',e=>{
    if(e.target===cy){
      cy.elements().removeClass('hi fa');
      const d=document.getElementById('dsel').value,q=document.getElementById('search').value.trim();
      if(d||q) doFilter();
    }
  });
  cy.on('dblclick','node',e=>{const url=e.target.data('url');if(url&&url!=='#')window.open(url,'_blank');});
}
